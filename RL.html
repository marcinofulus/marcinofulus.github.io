<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CartPole Hybrid Engine</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel for in-browser JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Lucide Icons (Browser version) -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* Prevent pull-to-refresh and bounce scrolling on mobile */
        body {
            overscroll-behavior-y: contain;
            background-color: #111827; /* Tailwind gray-900 */
        }
        
        /* Hide scrollbars for cleaner mobile look */
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }
    </style>
</head>
<body class="text-gray-100 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Lucide Icon Components Wrapper ---
        const Icon = ({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current) {
                    iconRef.current.innerHTML = '';
                    lucide.createIcons({
                        icons: { [name]: window.lucide.icons[name] },
                        nameAttr: 'data-lucide',
                        attrs: { class: className, width: size, height: size }
                    });
                    const svg = document.createElement('i');
                    svg.setAttribute('data-lucide', name);
                    iconRef.current.appendChild(svg);
                    lucide.createIcons({ root: iconRef.current });
                }
            }, [name, size, className]);
            return <span ref={iconRef} className="inline-flex items-center justify-center"></span>;
        };

        const pseudoCode = [
          "def hybrid_training_loop():",
          "    state = env.reset()",
          "    ",
          "    for step in range(MAX_STEPS):",
          "        if is_human_dragging_cart:",
          "            action = get_human_touch_position()",
          "        else:",
          "            action = agent.select_action(state)",
          "        ",
          "        tilt = get_phone_gyro_angle()",
          "        next_state, reward, done = env.step(action, tilt)",
          "        ",
          "        if not is_human_dragging_cart and agent_type == 'dqn':",
          "            buffer.append((state, action, reward, next_state, done))",
          "            agent.train_on_batch(buffer.sample())"
        ];

        // Physics Constants
        const GRAVITY = 5.0; 
        const MASSCART = 1.0;
        const MASSPOLE = 0.1;
        const TOTAL_MASS = MASSCART + MASSPOLE;
        const LENGTH = 0.5;
        const POLEMASS_LENGTH = MASSPOLE * LENGTH;
        const FORCE_MAG = 10.0;
        const TAU = 0.02;

        const getInitialState = (agent, startPos) => {
          if (startPos === 'down') return [0, 0, Math.PI, 0];
          return [0, 0, (Math.random() - 0.5) * 0.1, 0];
        };

        const stepPhysics = (state, action, trackLimit, agentType, tilt = 0) => {
          let [x, x_dot, theta, theta_dot] = state;
          let costheta = Math.cos(theta);
          let sintheta = Math.sin(theta);

          let gravity_torque = GRAVITY * Math.sin(theta + tilt);

          if (action !== null && typeof action.target_x === 'number') {
              let n_x = action.target_x;
              let n_x_dot = (n_x - x) / TAU;
              n_x_dot = Math.max(-20, Math.min(20, n_x_dot)); 
              n_x = x + n_x_dot * TAU;

              let xacc = (n_x_dot - x_dot) / TAU;
              xacc = Math.max(-60, Math.min(60, xacc)); 

              let thetaacc = (gravity_torque - costheta * xacc) / (LENGTH * (4.0 / 3.0));
              let n_theta_dot = theta_dot + TAU * thetaacc;
              n_theta_dot *= 0.99; 
              let n_theta = theta + TAU * n_theta_dot;

              let isDone = n_x < -trackLimit || n_x > trackLimit;
              return { ns: [n_x, n_x_dot, n_theta, n_theta_dot], isDone };
          }

          let force = 0.0; 
          if (action === 0) force = -FORCE_MAG;
          else if (action === 1) force = FORCE_MAG;
          if (action === null) force = -x_dot * 2.0; 

          force += TOTAL_MASS * GRAVITY * Math.sin(tilt);

          let temp = (force + POLEMASS_LENGTH * theta_dot * theta_dot * sintheta) / TOTAL_MASS;
          let thetaacc = (gravity_torque - costheta * temp) / (LENGTH * (4.0/3.0 - MASSPOLE * costheta * costheta / TOTAL_MASS));
          let xacc = temp - POLEMASS_LENGTH * thetaacc * costheta / TOTAL_MASS;

          let n_x = x + TAU * x_dot;
          let n_x_dot = x_dot + TAU * xacc;
          let n_theta = theta + TAU * theta_dot;
          let n_theta_dot = theta_dot + TAU * thetaacc;
          
          if (action === null) n_theta_dot *= 0.99; 

          let isDone = n_x < -trackLimit || n_x > trackLimit;
          if (action !== null && typeof action.target_x !== 'number') {
              if (n_theta < -0.209 || n_theta > 0.209) isDone = true;
          }
          
          return { ns: [n_x, n_x_dot, n_theta, n_theta_dot], isDone };
        };

        const calculateReward = (type, n_theta, isDone) => {
          if (type === 'survival') return isDone ? 0.0 : 1.0;
          if (type === 'angle') {
              let normalizedAngle = Math.abs(n_theta % (2 * Math.PI));
              if (normalizedAngle > Math.PI) normalizedAngle = 2 * Math.PI - normalizedAngle;
              return isDone ? 0.0 : Math.max(0, 1.0 - (normalizedAngle / 0.209));
          }
          return 0.0;
        };

        const createNet = () => ({
          W1: Array(4).fill(0).map(() => Array(16).fill(0).map(() => (Math.random() - 0.5) * 0.2)),
          b1: Array(16).fill(0),
          W2: Array(16).fill(0).map(() => Array(2).fill(0).map(() => (Math.random() - 0.5) * 0.2)),
          b2: Array(2).fill(0)
        });

        const forwardPass = (net, state) => {
          let h = Array(16).fill(0);
          for(let i=0; i<16; i++) {
            for(let j=0; j<4; j++) h[i] += state[j] * net.W1[j][i];
            h[i] += net.b1[i];
            h[i] = Math.max(0, h[i]);
          }
          let out = Array(2).fill(0);
          for(let i=0; i<2; i++) {
            for(let j=0; j<16; j++) out[i] += h[j] * net.W2[j][i];
            out[i] += net.b2[i];
          }
          return {h, out};
        };

        function CartPoleApp() {
          const [isPlaying, setIsPlaying] = useState(false);
          const [agentType, setAgentType] = useState('manual');
          const [rewardType, setRewardType] = useState('survival');
          const [lossType, setLossType] = useState('mse');
          const [trackLimit, setTrackLimit] = useState(2.4);
          const [startPos, setStartPos] = useState('down');

          const [stepCount, setStepCount] = useState(0);
          const [episodeCount, setEpisodeCount] = useState(1);
          const [envState, setEnvState] = useState(getInitialState('manual', 'down'));
          
          const [gyroEnabled, setGyroEnabled] = useState(false);
          const deviceTiltRef = useRef(0);
          const [uiTilt, setUiTilt] = useState(0);
          
          const [buffer, setBuffer] = useState([]);
          const [epsilon, setEpsilon] = useState(1.0);
          const [loss, setLoss] = useState(null);
          const [mainNet, setMainNet] = useState(createNet());
          const [targetNet, setTargetNet] = useState(createNet());

          const [pidParams, setPidParams] = useState({ kp_t: 10, kd_t: 5, kp_x: 1, kd_x: 1 });
          const [bestPidParams, setBestPidParams] = useState({ kp_t: 10, kd_t: 5, kp_x: 1, kd_x: 1 });
          const [episodeSteps, setEpisodeSteps] = useState(0);
          const [bestPidScore, setBestPidScore] = useState(0);
          
          const isDraggingRef = useRef(false);
          const targetXRef = useRef(0);
          const dragOffsetRef = useRef(0);
          const [isDraggingUI, setIsDraggingUI] = useState(false); 
          
          const containerRef = useRef(null);
          const envStateRef = useRef(envState);
          const trackLimitRef = useRef(trackLimit);
          
          const [logs, setLogs] = useState(["[Init] System Ready.", "-> Try enabling Gyro!"]);
          const logsEndRef = useRef(null);

          const addLog = (msg) => setLogs(prev => [...prev.slice(-19), msg]);

          useEffect(() => { envStateRef.current = envState; }, [envState]);
          useEffect(() => { trackLimitRef.current = trackLimit; }, [trackLimit]);
          useEffect(() => { if (logsEndRef.current) logsEndRef.current.scrollTop = logsEndRef.current.scrollHeight; }, [logs]);

          const handleOrientation = (e) => {
            let gamma = e.gamma || 0; 
            let tiltRad = gamma * (Math.PI / 180);
            deviceTiltRef.current = tiltRad;
          };

          const toggleGyro = async () => {
            if (!gyroEnabled) {
              if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                  const permissionState = await DeviceOrientationEvent.requestPermission();
                  if (permissionState === 'granted') {
                    window.addEventListener('deviceorientation', handleOrientation);
                    setGyroEnabled(true);
                    addLog("[Gyro] Sensor granted!");
                  } else {
                    addLog("[Gyro] Permission denied.");
                  }
                } catch (e) { addLog("[Gyro] Error requesting sensor."); }
              } else {
                window.addEventListener('deviceorientation', handleOrientation);
                setGyroEnabled(true);
                addLog("[Gyro] Sensor enabled.");
              }
            } else {
              window.removeEventListener('deviceorientation', handleOrientation);
              deviceTiltRef.current = 0;
              setGyroEnabled(false);
              addLog("[Gyro] Sensor disabled.");
            }
          };

          useEffect(() => {
            setIsPlaying(false);
            const defaultStart = agentType === 'manual' ? 'down' : 'up';
            setStartPos(defaultStart);
            setEnvState(getInitialState(agentType, defaultStart));
            setStepCount(0); setEpisodeCount(1);
            isDraggingRef.current = false; setIsDraggingUI(false);
          }, [agentType]);

          useEffect(() => {
            setIsPlaying(false);
            setEnvState(getInitialState(agentType, startPos));
          }, [startPos]);

          const runSimulationSteps = (stepsToRun) => {
            let l_envState = [...envState];
            let l_stepCount = stepCount, l_episodeCount = episodeCount;
            let l_tilt = deviceTiltRef.current;

            let l_mainNet = mainNet, l_targetNet = targetNet, l_buffer = buffer, l_epsilon = epsilon, l_loss = loss;
            let l_pidParams = pidParams, l_bestScore = bestPidScore, l_bestParams = bestPidParams, l_epsSteps = episodeSteps;

            for (let i = 0; i < stepsToRun; i++) {
              l_stepCount++;
              let ai_action = null;

              if (agentType === 'dqn') {
                l_epsilon = Math.max(0.01, l_epsilon * 0.99);
                if (Math.random() < l_epsilon) ai_action = Math.random() < 0.5 ? 0 : 1;
                else ai_action = forwardPass(l_mainNet, l_envState).out[0] > forwardPass(l_mainNet, l_envState).out[1] ? 0 : 1;
              } else if (agentType === 'pid') {
                let signal = (l_pidParams.kp_t * l_envState[2]) + (l_pidParams.kd_t * l_envState[3]) + (l_pidParams.kp_x * l_envState[0]) + (l_pidParams.kd_x * l_envState[1]);
                ai_action = signal > 0 ? 1 : 0;
              }

              let final_action = ai_action;
              if (isDraggingRef.current) {
                  final_action = { target_x: targetXRef.current };
              }

              const { ns, isDone } = stepPhysics(l_envState, final_action, trackLimit, agentType, l_tilt);
              let r = calculateReward(rewardType, ns[2], isDone);

              if (!isDraggingRef.current) {
                  if (agentType === 'dqn') {
                    l_buffer = [...l_buffer, { s: [...l_envState], a: final_action, r, ns: [...ns], d: isDone }];
                    if (l_buffer.length > 50) l_buffer.shift();
                    
                    if (l_buffer.length >= 5) {
                        const batchItem = l_buffer[Math.floor(Math.random() * l_buffer.length)];
                        let maxNextQ = 0;
                        if (!batchItem.d) maxNextQ = Math.max(...forwardPass(l_targetNet, batchItem.ns).out);
                        
                        const tQ = batchItem.r + 0.95 * maxNextQ;
                        let {h, out} = forwardPass(l_mainNet, batchItem.s);
                        let l_currentQ = out[batchItem.a];
                        
                        const lr = 0.05;
                        let d_out = [0, 0];
                        if (lossType === 'mse') { l_loss = Math.pow(tQ - l_currentQ, 2); d_out[batchItem.a] = (out[batchItem.a] - tQ); }
                        else { l_loss = Math.abs(tQ - l_currentQ); d_out[batchItem.a] = out[batchItem.a] > tQ ? 1 : -1; }

                        let newMain = JSON.parse(JSON.stringify(l_mainNet));
                        let d_h = Array(16).fill(0);
                        for(let k=0; k<16; k++) d_h[k] = h[k] > 0 ? (d_out[0] * newMain.W2[k][0] + d_out[1] * newMain.W2[k][1]) : 0;
                        for(let m=0; m<16; m++) for(let n=0; n<2; n++) newMain.W2[m][n] -= lr * h[m] * d_out[n];
                        newMain.b2[0] -= lr * d_out[0]; newMain.b2[1] -= lr * d_out[1];
                        for(let m=0; m<4; m++) for(let n=0; n<16; n++) newMain.W1[m][n] -= lr * batchItem.s[m] * d_h[n];
                        for(let n=0; n<16; n++) newMain.b1[n] -= lr * d_h[n];
                        l_mainNet = newMain;
                    }
                    if (l_stepCount % 5 === 0) l_targetNet = JSON.parse(JSON.stringify(l_mainNet));
                  } else if (agentType === 'pid') {
                    l_epsSteps++;
                  }
              }

              if (isDone) {
                  l_episodeCount++;
                  if (agentType === 'pid') {
                      if (l_epsSteps > l_bestScore) { l_bestScore = l_epsSteps; l_bestParams = { ...l_pidParams }; }
                      l_pidParams = {
                          kp_t: l_bestParams.kp_t + (Math.random() - 0.5) * 5,
                          kd_t: Math.max(0, l_bestParams.kd_t + (Math.random() - 0.5) * 2),
                          kp_x: l_bestParams.kp_x + (Math.random() - 0.5) * 1,
                          kd_x: l_bestParams.kd_x + (Math.random() - 0.5) * 1
                      };
                      l_epsSteps = 0;
                  }
                  l_envState = getInitialState(agentType, startPos);
                  if (agentType === 'manual') l_stepCount = 0;
              } else {
                  l_envState = ns;
              }
            }

            setEnvState(l_envState); setStepCount(l_stepCount); setEpisodeCount(l_episodeCount);
            if (agentType === 'dqn') { setMainNet(l_mainNet); setTargetNet(l_targetNet); setBuffer(l_buffer); setEpsilon(l_epsilon); setLoss(l_loss); }
            if (agentType === 'pid') { setPidParams(l_pidParams); setBestPidScore(l_bestScore); setBestPidParams(l_bestParams); setEpisodeSteps(l_epsSteps); }
            
            if (gyroEnabled && l_stepCount % 2 === 0) setUiTilt(l_tilt);
          };

          useEffect(() => {
            let timeout;
            if (isPlaying) {
              let delay = 20; 
              let steps = 1;
              if (agentType !== 'manual' && !isDraggingUI) { delay = 10; steps = 50; }
              timeout = setTimeout(() => runSimulationSteps(steps), delay);
            }
            return () => clearTimeout(timeout);
          }, [isPlaying, envState, stepCount, agentType, isDraggingUI, gyroEnabled]);

          const handleReset = () => {
            setEnvState(getInitialState(agentType, startPos));
            setStepCount(0); setEpisodeCount(1);
            setBuffer([]); setEpsilon(1.0);
            setMainNet(createNet()); setTargetNet(createNet());
            setPidParams({ kp_t: 10, kd_t: 5, kp_x: 1, kd_x: 1 });
            setBestPidParams({ kp_t: 10, kd_t: 5, kp_x: 1, kd_x: 1 });
            setBestPidScore(0); setEpisodeSteps(0);
            isDraggingRef.current = false; setIsDraggingUI(false);
            setLogs(["[System] Reset."]); setIsPlaying(false);
          };

          const handlePointerDown = (e) => {
            e.currentTarget.setPointerCapture(e.pointerId);
            isDraggingRef.current = true;
            setIsDraggingUI(true);
            
            if (containerRef.current) {
                const rect = containerRef.current.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const cartXPct = 50 + (envStateRef.current[0] / trackLimitRef.current) * 50;
                const cartX = (cartXPct / 100) * rect.width;
                dragOffsetRef.current = cartX - mouseX;
                targetXRef.current = envStateRef.current[0];
            }
          };

          const handlePointerMove = (e) => {
            if (!isDraggingRef.current || !containerRef.current) return;
            const rect = containerRef.current.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const targetCartX = mouseX + dragOffsetRef.current;
            
            let target_x = ((targetCartX / rect.width) - 0.5) * 2 * trackLimitRef.current;
            targetXRef.current = Math.max(-trackLimitRef.current, Math.min(trackLimitRef.current, target_x));
          };

          const handlePointerUp = (e) => {
            if (isDraggingRef.current) {
              e.currentTarget.releasePointerCapture(e.pointerId);
              isDraggingRef.current = false;
              setIsDraggingUI(false);
            }
          };

          return (
            <div className="min-h-screen p-2 md:p-4 flex flex-col select-none max-w-5xl mx-auto">
              <header className="mb-2 flex justify-between items-end">
                <h1 className="text-xl md:text-2xl font-bold text-blue-400">CartPole Hybrid</h1>
              </header>

              <div className="flex flex-col lg:flex-row gap-2 md:gap-4 flex-grow">
                
                {/* Visual Section */}
                <div className="flex flex-col gap-2 w-full lg:w-1/2">
                  
                  <div className="bg-gray-800 p-2 rounded shadow flex items-center justify-between border border-gray-700">
                    <div className="flex space-x-1 md:space-x-2">
                      <button onClick={() => setIsPlaying(!isPlaying)} className={`flex items-center px-3 py-2 rounded font-bold text-xs md:text-sm shadow-lg ${isPlaying ? 'bg-yellow-600 active:bg-yellow-700' : 'bg-green-600 active:bg-green-700'}`}>
                        <Icon name={isPlaying ? "pause" : "play"} size={16} className="mr-1" />
                        {isPlaying ? "Pause" : "Play"}
                      </button>
                      <button onClick={handleReset} className="flex items-center px-3 py-2 bg-red-600 active:bg-red-700 rounded font-bold text-xs md:text-sm shadow-lg">
                        <Icon name="rotate-ccw" size={16} className="mr-1" /> Reset
                      </button>
                    </div>
                    <button onClick={toggleGyro} className={`flex items-center px-3 py-2 rounded font-bold text-xs md:text-sm shadow-lg transition-colors ${gyroEnabled ? 'bg-purple-600 border border-purple-400 animate-pulse' : 'bg-gray-700 border border-gray-600 text-gray-300'}`}>
                      <Icon name="smartphone" size={16} className="mr-1 md:mr-2" /> {gyroEnabled ? 'Gyro ON' : 'Gyro'}
                    </button>
                  </div>

                  <div className="bg-gray-800 p-2 rounded shadow border border-gray-700 relative overflow-hidden">
                     <div className="absolute top-2 right-2 z-10 text-[10px] text-gray-400 text-right font-mono bg-black/50 p-1 rounded">
                        {agentType === 'dqn' ? <div>Eps: <span className="text-yellow-400">{epsilon.toFixed(2)}</span></div> : null}
                        <div>Step: <span className="text-white">{stepCount}</span></div>
                        <div>Ep: <span className="text-white">{episodeCount}</span></div>
                     </div>
                     
                     <div ref={containerRef} className="w-full h-48 md:h-56 bg-sky-900/30 rounded relative overflow-hidden border border-gray-600 flex flex-col justify-end pb-8" style={{ touchAction: 'none' }}>
                        {gyroEnabled && (
                          <div className="absolute inset-0 flex items-center justify-center pointer-events-none opacity-20">
                             <div className="flex flex-col items-center justify-center transition-transform" style={{ transform: `rotate(${uiTilt}rad)` }}>
                               <span className="text-4xl font-black text-white">G</span>
                               <div className="w-1 h-12 bg-white rounded"></div>
                               <div className="w-4 h-4 border-b-4 border-r-4 border-white transform rotate-45 -mt-2"></div>
                             </div>
                          </div>
                        )}

                        <div className="absolute top-0 bottom-8 left-0 bg-red-900/30 border-r border-red-500/50" style={{width: `${50 - (trackLimit/3.0)*50}%`}}></div>
                        <div className="absolute top-0 bottom-8 right-0 bg-red-900/30 border-l border-red-500/50" style={{width: `${50 - (trackLimit/3.0)*50}%`}}></div>
                        <div className="w-full h-1 bg-gray-500 absolute bottom-8"></div>
                        
                        <div className="absolute bottom-7 left-1/2 w-px h-2 bg-gray-500 transform -translate-x-1/2"></div>
                        <div className="absolute bottom-7 w-px h-2 bg-red-500 transform -translate-x-1/2" style={{left: `${50 - (trackLimit/3.0)*50}%`}}></div>
                        <div className="absolute bottom-7 w-px h-2 bg-red-500 transform -translate-x-1/2" style={{left: `${50 + (trackLimit/3.0)*50}%`}}></div>

                        {isDraggingUI && agentType !== 'manual' && (
                          <div className="absolute top-2 left-2 text-xs font-bold text-orange-400 bg-black/60 px-2 py-1 rounded animate-pulse">HUMAN OVERRIDE</div>
                        )}

                        <div className="absolute bottom-8 flex flex-col items-center justify-end z-20 pointer-events-none" style={{ left: `${50 + (envState[0] / 3.0) * 50}%`, width: '60px', height: '30px', marginLeft: '-30px', transition: 'left 0.05s linear' }}>
                           <div className="w-3 bg-amber-600 absolute bottom-6 origin-bottom rounded-t-full shadow-[0_0_10px_rgba(0,0,0,0.5)]" style={{ height: '70px', transform: `rotate(${envState[2]}rad)`, transition: 'transform 0.05s linear' }}></div>
                           <div className={`w-full h-full rounded shadow-xl relative cursor-grab active:cursor-grabbing pointer-events-auto ${isDraggingUI ? 'bg-blue-500 scale-110 shadow-[0_0_15px_rgba(59,130,246,0.8)] border-2 border-white/50' : 'bg-slate-400'} `} onPointerDown={handlePointerDown} onPointerMove={handlePointerMove} onPointerUp={handlePointerUp} onPointerCancel={handlePointerUp}>
                             <div className="w-4 h-4 bg-gray-800 rounded-full absolute -bottom-2 left-1 shadow-md"></div>
                             <div className="w-4 h-4 bg-gray-800 rounded-full absolute -bottom-2 right-1 shadow-md"></div>
                           </div>
                        </div>
                     </div>

                     <div className="mt-2 bg-gray-900 p-1 md:p-2 rounded grid grid-cols-4 gap-1 text-center text-[10px] md:text-xs font-mono border border-gray-600">
                       <div><div className="text-gray-500">Pos</div><div className="text-white">{envState[0].toFixed(2)}</div></div>
                       <div><div className="text-gray-500">Vel</div><div className="text-white">{envState[1].toFixed(2)}</div></div>
                       <div><div className="text-gray-500">Ang</div><div className="text-white">{envState[2].toFixed(2)}</div></div>
                       <div><div className="text-gray-500">A.Vel</div><div className="text-white">{envState[3].toFixed(2)}</div></div>
                     </div>
                  </div>

                  {agentType === 'manual' ? (
                    <div className="bg-gray-800 p-2 rounded shadow border border-gray-700 flex-grow text-xs md:text-sm flex flex-col justify-center text-center">
                       <h3 className="text-orange-400 font-bold mb-1 uppercase tracking-wide">Manual Physics Active</h3>
                    </div>
                  ) : agentType === 'dqn' ? (
                     <div className="bg-gray-800 p-2 rounded shadow border border-gray-700 flex-grow">
                       <h3 className="text-[10px] md:text-xs uppercase tracking-widest text-purple-400 font-bold mb-2">Neural Network Stats</h3>
                       <div className="bg-gray-900 p-2 rounded border border-gray-600 text-center flex items-center justify-between">
                           <span className="text-[10px] md:text-xs text-gray-500">{lossType === 'mse' ? 'MSE Loss' : 'L1 Loss'}</span>
                           <span className="text-sm md:text-xl font-mono text-red-400">{loss !== null ? loss.toFixed(4) : '-'}</span>
                       </div>
                    </div>
                  ) : (
                    <div className="bg-gray-800 p-2 rounded shadow border border-gray-700 flex-grow">
                       <h3 className="text-[10px] md:text-xs uppercase tracking-widest text-pink-400 font-bold mb-1">PID Hill Climbing</h3>
                       <div className="bg-green-900/30 p-1 md:p-2 rounded border border-green-700 text-center">
                          <div className="text-gray-400 text-[10px] md:text-xs">High Score (Steps)</div>
                          <div className="text-lg md:text-2xl font-bold text-green-400">{bestPidScore}</div>
                       </div>
                    </div>
                  )}
                </div>

                {/* Settings Section */}
                <div className="flex flex-col gap-2 w-full lg:w-1/2">
                  <div className="bg-gray-800 p-2 md:p-3 rounded shadow border border-gray-700">
                     <h3 className="text-[10px] md:text-xs uppercase tracking-widest text-gray-400 font-bold flex items-center mb-2">
                       <Icon name="settings" size={14} className="mr-1"/> Parameters
                     </h3>
                     <div className="grid grid-cols-2 gap-2 text-[10px] md:text-sm">
                        <div>
                           <label className="text-gray-400 block mb-1">Agent Type</label>
                           <select className="bg-gray-900 text-white p-1 md:p-2 rounded w-full border border-gray-600" value={agentType} onChange={(e)=> {setAgentType(e.target.value);}}>
                             <option value="manual">Manual Playground</option>
                             <option value="dqn">Deep Q-Network</option>
                             <option value="pid">PID Controller</option>
                           </select>
                        </div>
                        <div>
                           <label className="text-gray-400 block mb-1">Start Pos</label>
                           <select className="bg-gray-900 text-white p-1 md:p-2 rounded w-full border border-gray-600" value={startPos} onChange={(e)=> {setStartPos(e.target.value);}}>
                             <option value="down">Inverted (Down)</option>
                             <option value="up">Balanced (Up)</option>
                           </select>
                        </div>
                     </div>
                  </div>

                  <div className="bg-gray-800 p-2 md:p-3 rounded shadow flex flex-col border border-gray-700 h-24 md:h-32 shrink-0">
                    <h3 className="text-[10px] md:text-xs uppercase tracking-widest text-gray-400 font-bold mb-1 md:mb-2 flex items-center shrink-0">
                      <Icon name="info" size={14} className="mr-1"/> Hybrid Log
                    </h3>
                    <div className="flex-grow bg-gray-900 rounded p-1 md:p-2 overflow-y-auto font-mono text-[9px] md:text-xs" ref={logsEndRef}>
                      {logs.map((log, i) => (
                        <div key={i} className={`mb-1 ${i === logs.length - 1 ? 'text-blue-300 font-bold' : 'text-gray-500'}`}>{log}</div>
                      ))}
                    </div>
                  </div>
                </div>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<CartPoleApp />);
    </script>
</body>
</html>
