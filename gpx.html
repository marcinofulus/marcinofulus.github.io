<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Outdoor Map Router</title>
    
    <!-- Leaflet CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- Chart.js for Elevation Profile -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Hide Leaflet's default DivIcon styling so our custom SVG looks good */
        .leaflet-div-icon {
            background: transparent !important;
            border: none !important;
        }
        /* Ensure the app takes full screen */
        body, html { height: 100%; margin: 0; padding: 0; }
        
        /* Custom scrollbar for sidebar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="flex flex-col md:flex-row h-screen bg-gray-50 overflow-hidden text-sm">

    <!-- SIDEBAR -->
    <div class="w-full md:w-96 flex flex-col h-[45vh] md:h-full bg-white shadow-xl z-[1000] border-r border-gray-200">
        <!-- Header & Controls -->
        <div class="p-4 bg-gray-50 border-b border-gray-200 flex-shrink-0">
            <h1 class="text-xl font-bold text-gray-800 mb-4"><i class="fa-solid fa-route text-blue-600 mr-2"></i>Map Router</h1>
            
            <div class="space-y-3">
                <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-1">Default Profile:</label>
                    <select id="default-profile" class="w-full p-2 border rounded bg-white">
                        <option value="foot-hiking">Hiking (Prefers Trails)</option>
                        <option value="cycling-mountain" selected>Mountain Biking (MTB)</option>
                        <option value="cycling-regular">Regular Cycling</option>
                        <option value="foot-walking">Walking (Urban)</option>
                    </select>
                </div>
                
                <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-1">Default Priority:</label>
                    <select id="default-pref" class="w-full p-2 border rounded bg-white">
                        <option value="recommended">Recommended (Trails)</option>
                        <option value="shortest" selected>Shortest Distance</option>
                        <option value="fastest">Fastest Time</option>
                    </select>
                </div>

                <div class="flex items-center mt-2">
                    <input type="checkbox" id="smart-insert" class="w-4 h-4 text-blue-600 rounded border-gray-300">
                    <label for="smart-insert" class="ml-2 text-sm text-gray-700">Smart Insert along route</label>
                </div>

                <div class="grid grid-cols-2 gap-2 mt-4">
                    <button id="btn-calc" class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded transition">
                        <i class="fa-solid fa-play mr-1"></i> Calculate
                    </button>
                    <button id="btn-clear" class="bg-red-500 hover:bg-red-600 text-white font-bold py-2 px-4 rounded transition">
                        <i class="fa-solid fa-trash mr-1"></i> Clear All
                    </button>
                </div>

                <!-- Dual Export Buttons Container -->
                <div id="export-container" class="grid grid-cols-2 gap-2 mt-2 hidden">
                    <button id="btn-export-route" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-2 rounded transition text-xs shadow">
                        <i class="fa-solid fa-download mr-1"></i> Route GPX
                    </button>
                    <button id="btn-export-wp" class="bg-indigo-500 hover:bg-indigo-600 text-white font-bold py-2 px-2 rounded transition text-xs shadow">
                        <i class="fa-solid fa-location-dot mr-1"></i> WPs Only
                    </button>
                </div>

                <!-- GPX Upload Button -->
                <button onclick="document.getElementById('gpx-upload').click()" class="w-full mt-2 bg-gray-600 hover:bg-gray-700 text-white font-bold py-2 px-2 rounded transition text-xs shadow">
                    <i class="fa-solid fa-upload mr-1"></i> Upload Background GPX
                </button>
                <input type="file" id="gpx-upload" accept=".gpx" class="hidden" multiple onchange="handleGPXUpload(event)">
                
                <!-- Background Tracks List -->
                <div id="bg-tracks-container" class="mt-3 hidden">
                    <h4 class="text-xs font-bold text-gray-600 border-b pb-1 mb-2">Background Tracks</h4>
                    <div id="bg-tracks-list" class="space-y-2 max-h-32 overflow-y-auto pr-1"></div>
                </div>

                <!-- PTTK Vector Trails -->
                <button id="btn-fetch-trails" onclick="fetchVectorTrails()" class="w-full mt-2 bg-amber-500 hover:bg-amber-600 text-white font-bold py-2 px-2 rounded transition text-xs shadow">
                    <i class="fa-solid fa-map-location-dot mr-1"></i> Fetch PTTK Trails (In View)
                </button>
            </div>
            
            <div id="output-log" class="mt-3 text-xs text-gray-600 font-mono h-6 overflow-hidden">Ready. Click map to add waypoints.</div>
        </div>

        <!-- Waypoint List -->
        <div class="flex-1 overflow-y-auto p-4" id="wp-list">
            <!-- JS will populate rows here -->
        </div>
    </div>

    <!-- RIGHT PANEL (Map + Elevation Chart) -->
    <div class="flex-1 flex flex-col h-[55vh] md:h-full relative z-10 overflow-hidden">
        <div id="map" class="flex-1 relative w-full"></div>
        
        <!-- Elevation Chart Container -->
        <div id="elevation-container" class="h-48 md:h-64 bg-white border-t border-gray-300 hidden w-full p-2 flex-shrink-0 relative">
            <canvas id="elevationChart"></canvas>
        </div>
    </div>

    <!-- APPLICATION LOGIC -->
    <script>
        // --- 1. Global State & Config ---
        const API_KEY = 'eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6IjlhZWQ0OGIzOWQ4MzQ5MTFhNzllNWRiOTllN2RmNWFjIiwiaCI6Im11cm11cjY0In0=';
        let waypoints = []; // Array of { lat, lng, profile, pref, name, alt, marker }
        let routeLayer = null;
        let lastRouteCoords = []; // Used for GPX export [lat, lng, ele]
        let routeSummary = { distance: 0, ascent: 0 }; // Store metrics for filename
        
        let bgTracks = []; // Stores uploaded background tracks
        let fetchedSegments = []; // Stores alternative routes from API per segment
        let selectedAltIndices = []; // Stores the currently selected alternative index for each segment
        
        let chartData = []; // Data for the elevation plot
        let elevationChart = null; 
        let mapHoverMarker = null; // Syncs chart hover to map

        // --- 2. Map Initialization ---
        const map = L.map('map').setView([49.7395, 18.9953], 14);
        
        // Create custom pane to ensure the calculated route always stays on top of everything
        map.createPane('routePane');
        map.getPane('routePane').style.zIndex = 450;
        // Removed pointerEvents = 'none' so that the orange alternative lines can be clicked!
        
        const altLayers = L.layerGroup().addTo(map); // Layer group for alternative orange lines

        // Base Maps
        const openTopoMap = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
            maxZoom: 17,
            attribution: 'Map data: &copy; OpenStreetMap contributors, SRTM | Map style: &copy; OpenTopoMap'
        });
        
        const osmStandard = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; OpenStreetMap contributors'
        });

        const esriSatellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            maxZoom: 19,
            attribution: 'Tiles &copy; Esri &mdash; Source: Esri, i-cubed, USDA, USGS, AEX, GeoEye, Getmapping, Aerogrid, IGN, IGP, UPR-EGP, and the GIS User Community'
        });

        const cyclOSM = L.tileLayer('https://{s}.tile-cyclosm.openstreetmap.fr/cyclosm/{z}/{x}/{y}.png', {
            maxZoom: 20,
            attribution: 'CyclOSM | Map data: &copy; OpenStreetMap contributors'
        });
        
        openTopoMap.addTo(map);

        // Open Source Route Overlays (Waymarked Trails)
        const hikingOverlay = L.tileLayer('https://tile.waymarkedtrails.org/hiking/{z}/{x}/{y}.png', {
            maxZoom: 18,
            attribution: 'Trails: &copy; Waymarked Trails (OSM)'
        });
        
        const cyclingOverlay = L.tileLayer('https://tile.waymarkedtrails.org/cycling/{z}/{x}/{y}.png', {
            maxZoom: 18,
            attribution: 'Trails: &copy; Waymarked Trails (OSM)'
        });

        const mtbOverlay = L.tileLayer('https://tile.waymarkedtrails.org/mtb/{z}/{x}/{y}.png', {
            maxZoom: 18,
            attribution: 'Trails: &copy; Waymarked Trails (OSM)'
        });

        // Vector Trail Layer
        const pttkTrailsLayer = L.layerGroup();

        // Add Layer Control
        const baseMaps = {
            "OpenTopoMap (Default)": openTopoMap,
            "OSM Standard": osmStandard,
            "CyclOSM (Cycling)": cyclOSM,
            "Esri Satellite": esriSatellite
        };
        const overlayMaps = {
            "Hiking Routes (Raster)": hikingOverlay,
            "Cycling Routes (Raster)": cyclingOverlay,
            "MTB Routes (Raster)": mtbOverlay,
            "PTTK Trails (Vector)": pttkTrailsLayer
        };
        L.control.layers(baseMaps, overlayMaps, { position: 'topright' }).addTo(map);

        // --- 3. UI Element Bindings ---
        const uiList = document.getElementById('wp-list');
        const defaultProfile = document.getElementById('default-profile');
        const defaultPref = document.getElementById('default-pref');
        const smartInsert = document.getElementById('smart-insert');
        const log = document.getElementById('output-log');
        const exportContainer = document.getElementById('export-container');
        const elevationContainer = document.getElementById('elevation-container');

        function setLog(msg, isError = false) {
            log.innerHTML = `<span class="${isError ? 'text-red-600 font-bold' : ''}">${msg}</span>`;
            console.log(msg);
        }

        // --- 4. Math Helper ---
        function pointToSegmentDist2(p, v, w) {
            const l2 = Math.pow(v.lat - w.lat, 2) + Math.pow(v.lng - w.lng, 2);
            if (l2 === 0) return Math.pow(p.lat - v.lat, 2) + Math.pow(p.lng - v.lng, 2);
            let t = ((p.lat - v.lat) * (w.lat - v.lat) + (p.lng - v.lng) * (w.lng - v.lng)) / l2;
            t = Math.max(0, Math.min(1, t));
            const projLat = v.lat + t * (w.lat - v.lat);
            const projLng = v.lng + t * (w.lng - v.lng);
            return Math.pow(p.lat - projLat, 2) + Math.pow(p.lng - projLng, 2);
        }

        // --- 5. Waypoint Management ---
        function createNumberedIcon(number) {
            const numStr = number.toString().padStart(2, '0');
            const htmlContent = `
                <div style="position: relative; width: 30px; height: 42px;">
                    <svg viewBox="0 0 30 42" style="position: absolute; left: 0; top: 0; width: 30px; height: 42px; filter: drop-shadow(0px 3px 2px rgba(0,0,0,0.5));">
                        <path d="M15 2C7.8 2 2 7.8 2 15c0 9.5 13 25 13 25s13-15.5 13-25C28 7.8 22.2 2 15 2z" fill="#0078A8" stroke="white" stroke-width="2"/>
                    </svg>
                    <div style="position: absolute; top: 7px; left: 0; width: 30px; text-align: center; color: white; font-weight: bold; font-family: Arial, sans-serif; font-size: 13px; pointer-events: none;">
                        ${numStr}
                    </div>
                </div>
            `;
            return L.divIcon({ html: htmlContent, iconSize: [30, 42], iconAnchor: [15, 42] });
        }

        function updateMarkerIcons() {
            waypoints.forEach((wp, i) => {
                wp.marker.setIcon(createNumberedIcon(i + 1));
            });
        }

        function clearRoute() {
            if (routeLayer) map.removeLayer(routeLayer);
            altLayers.clearLayers();
            routeLayer = null;
            lastRouteCoords = [];
            fetchedSegments = [];
            selectedAltIndices = [];
            chartData = [];
            routeSummary = { distance: 0, ascent: 0 };
            exportContainer.classList.add('hidden'); // Hide export buttons
            
            // Hide per-segment dropdowns
            waypoints.forEach((_, i) => {
                const container = document.getElementById(`alt-dropdown-container-${i}`);
                if (container) {
                    container.classList.add('hidden');
                    container.innerHTML = '';
                }
            });

            // Clear Chart
            elevationContainer.classList.add('hidden');
            if (mapHoverMarker) {
                map.removeLayer(mapHoverMarker);
                mapHoverMarker = null;
            }
        }

        async function fetchLocationName(wpData) {
            try {
                const url = `https://api.openrouteservice.org/geocode/reverse?api_key=${API_KEY}&point.lon=${wpData.lng}&point.lat=${wpData.lat}&size=1`;
                const response = await fetch(url, {
                    headers: { 'Accept': 'application/json; charset=utf-8' }
                });
                
                const resText = await response.text();
                let data;
                try {
                    data = JSON.parse(resText);
                } catch (e) {
                    console.error("Reverse geocoding returned non-JSON:", resText.substring(0, 50));
                    return; // Fail gracefully if API hits rate limit and returns XML/HTML
                }
                
                if (data.features && data.features.length > 0) {
                    const props = data.features[0].properties;
                    wpData.name = props.name || props.street || props.locality || (props.label ? props.label.split(',')[0] : `WP ${waypoints.indexOf(wpData) + 1}`);
                    
                    if (wpData.marker.getTooltip()) {
                        wpData.marker.setTooltipContent(wpData.name);
                    }
                    renderUI(); 
                }
            } catch (e) {
                console.error("Reverse geocoding failed", e);
            }
        }

        function renderUI() {
            uiList.innerHTML = '';
            waypoints.forEach((wp, i) => {
                const isLast = i === waypoints.length - 1;
                const div = document.createElement('div');
                div.className = 'mb-3 bg-white border border-gray-200 rounded shadow-sm p-2';
                
                let row1 = `
                    <div class="flex justify-between items-center mb-2">
                        <div class="flex-1 mr-2 overflow-hidden">
                            <input type="text" value="${wp.name.replace(/"/g, '&quot;')}" onchange="updateWpName(${i}, this.value)" class="font-bold text-gray-800 w-full bg-transparent border-b border-dashed border-gray-300 focus:border-blue-500 focus:outline-none focus:bg-blue-50 transition-colors px-1 text-sm" title="Edit name" placeholder="Waypoint Name">
                            <div class="text-[10px] text-gray-400 font-normal px-1 mt-1">${wp.lat.toFixed(4)}, ${wp.lng.toFixed(4)}</div>
                        </div>
                        <div class="flex space-x-1 flex-shrink-0">
                            <button onclick="moveWp(${i}, -1)" ${i === 0 ? 'disabled' : ''} class="p-1 w-8 h-8 bg-gray-100 hover:bg-gray-200 rounded disabled:opacity-30"><i class="fa-solid fa-arrow-up"></i></button>
                            <button onclick="moveWp(${i}, 1)" ${isLast ? 'disabled' : ''} class="p-1 w-8 h-8 bg-gray-100 hover:bg-gray-200 rounded disabled:opacity-30"><i class="fa-solid fa-arrow-down"></i></button>
                            <button onclick="removeWp(${i})" class="p-1 w-8 h-8 bg-red-100 hover:bg-red-200 text-red-600 rounded"><i class="fa-solid fa-xmark"></i></button>
                        </div>
                    </div>
                `;

                let row2 = '';
                if (!isLast) {
                    const forceAlt = waypoints.length === 2;
                    row2 = `
                        <div class="flex flex-col bg-gray-50 p-1 rounded border border-dashed border-gray-300">
                            <div class="flex items-center text-xs w-full">
                                <span class="text-gray-500 w-12">&rarr; to:</span>
                                <label class="flex items-center space-x-1 mr-2 cursor-pointer" title="Find alternative routes for this segment">
                                    <input type="checkbox" onchange="updateWp(${i}, 'alt', this.checked)" ${wp.alt || forceAlt ? 'checked' : ''} ${forceAlt ? 'disabled' : ''} class="cursor-pointer">
                                    <span class="font-bold text-gray-600">Alt</span>
                                </label>
                                <select onchange="updateWp(${i}, 'profile', this.value)" class="flex-1 p-1 mr-1 border rounded bg-white">
                                    <option value="foot-hiking" ${wp.profile === 'foot-hiking' ? 'selected' : ''}>Hike</option>
                                    <option value="cycling-mountain" ${wp.profile === 'cycling-mountain' ? 'selected' : ''}>MTB</option>
                                    <option value="cycling-regular" ${wp.profile === 'cycling-regular' ? 'selected' : ''}>Cycle</option>
                                    <option value="foot-walking" ${wp.profile === 'foot-walking' ? 'selected' : ''}>Walk</option>
                                </select>
                                <select onchange="updateWp(${i}, 'pref', this.value)" class="w-16 p-1 border rounded bg-white">
                                    <option value="recommended" ${wp.pref === 'recommended' ? 'selected' : ''}>Rec</option>
                                    <option value="shortest" ${wp.pref === 'shortest' ? 'selected' : ''}>Short</option>
                                    <option value="fastest" ${wp.pref === 'fastest' ? 'selected' : ''}>Fast</option>
                                </select>
                            </div>
                            <div id="alt-dropdown-container-${i}" class="mt-1 hidden w-full"></div>
                        </div>
                    `;
                }

                div.innerHTML = row1 + row2;
                uiList.appendChild(div);
            });
            saveState(); 
        }

        window.updateWp = (idx, key, val) => { waypoints[idx][key] = val; clearRoute(); saveState(); };
        window.updateWpName = (idx, val) => { 
            waypoints[idx].name = val; 
            waypoints[idx].marker.setTooltipContent(val);
            saveState(); 
        };
        window.removeWp = (idx) => { map.removeLayer(waypoints[idx].marker); waypoints.splice(idx, 1); updateMarkerIcons(); clearRoute(); renderUI(); };
        window.moveWp = (idx, dir) => {
            const target = idx + dir;
            if (target >= 0 && target < waypoints.length) {
                [waypoints[idx], waypoints[target]] = [waypoints[target], waypoints[idx]];
                updateMarkerIcons(); clearRoute(); renderUI();
            }
        };

        function addWaypoint(latlng, index = null, existingData = null) {
            const marker = L.marker(latlng, { draggable: true }).addTo(map);
            
            marker.on('dragstart', () => clearRoute());
            marker.on('dragend', (e) => {
                const wpIdx = waypoints.findIndex(w => w.marker === marker);
                if (wpIdx > -1) {
                    const newPos = e.target.getLatLng();
                    waypoints[wpIdx].lat = newPos.lat;
                    waypoints[wpIdx].lng = newPos.lng;
                    renderUI(); 
                    fetchLocationName(waypoints[wpIdx]); 
                }
            });

            const defaultName = existingData && existingData.name ? existingData.name : `Loading...`;
            
            marker.bindTooltip(defaultName, { 
                direction: 'right', 
                offset: [15, -20],
                className: 'font-bold bg-white/90 shadow-sm border-0 rounded px-2 py-1 text-xs' 
            });

            const wpData = {
                lat: latlng.lat,
                lng: latlng.lng,
                profile: existingData ? existingData.profile : defaultProfile.value,
                pref: existingData ? existingData.pref : defaultPref.value,
                name: defaultName,
                alt: existingData && existingData.alt !== undefined ? existingData.alt : false,
                marker: marker
            };

            if (index === null || index >= waypoints.length) {
                waypoints.push(wpData);
            } else {
                waypoints.splice(index, 0, wpData);
            }

            updateMarkerIcons();
            clearRoute();
            renderUI();

            if (!existingData || !existingData.name) {
                fetchLocationName(wpData);
            }
        }

        // --- 6. Map Interaction ---
        map.on('click', function(e) {
            const p = e.latlng;
            if (waypoints.length < 2 || !smartInsert.checked) {
                addWaypoint(p);
                return;
            }

            let minDist = Infinity;
            let bestInsertIdx = waypoints.length;

            for (let i = 0; i < waypoints.length - 1; i++) {
                const d = pointToSegmentDist2(p, waypoints[i], waypoints[i+1]);
                if (d < minDist) {
                    minDist = d;
                    bestInsertIdx = i + 1;
                }
            }
            
            const lastWp = waypoints[waypoints.length - 1];
            const endDist = Math.pow(p.lat - lastWp.lat, 2) + Math.pow(p.lng - lastWp.lng, 2);
            if (endDist < minDist) bestInsertIdx = waypoints.length;

            addWaypoint(p, bestInsertIdx);
        });

        // --- 7. Local Storage ---
        function saveState() {
            const safeData = waypoints.map(wp => ({ lat: wp.lat, lng: wp.lng, profile: wp.profile, pref: wp.pref, name: wp.name, alt: wp.alt }));
            localStorage.setItem('mapRouterState', JSON.stringify(safeData));
        }

        function loadState() {
            const saved = localStorage.getItem('mapRouterState');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    data.forEach(wp => addWaypoint(L.latLng(wp.lat, wp.lng), null, wp));
                    if(waypoints.length > 0) map.panTo([waypoints[0].lat, waypoints[0].lng]);
                    setLog("Loaded saved session.");
                    if(waypoints.length > 0) {
                        exportContainer.classList.remove('hidden');
                        document.getElementById('btn-export-route').classList.add('hidden');
                    }
                } catch (e) {
                    console.error("Error loading state", e);
                }
            }
        }

        // --- GPX Upload & Background Tracking ---
        function renderBgTracks() {
            const container = document.getElementById('bg-tracks-container');
            const list = document.getElementById('bg-tracks-list');
            list.innerHTML = '';
            
            if (bgTracks.length === 0) {
                container.classList.add('hidden');
                return;
            }
            container.classList.remove('hidden');

            bgTracks.forEach(track => {
                const div = document.createElement('div');
                div.className = 'flex justify-between items-center bg-gray-100 p-1 rounded text-xs';
                div.innerHTML = `
                    <div class="flex items-center space-x-2 overflow-hidden flex-1">
                        <input type="color" value="${track.color}" onchange="updateBgTrackColor('${track.id}', this.value)" class="w-5 h-5 border-0 p-0 cursor-pointer rounded shrink-0">
                        <span class="truncate text-gray-700" title="${track.name}">${track.name}</span>
                    </div>
                    <button onclick="removeBgTrack('${track.id}')" class="text-red-500 hover:text-red-700 p-1 shrink-0"><i class="fa-solid fa-trash"></i></button>
                `;
                list.appendChild(div);
            });
        }

        window.updateBgTrackColor = (id, color) => {
            const track = bgTracks.find(t => t.id === id);
            if (track) {
                track.color = color;
                track.layer.setStyle({ color: color });
            }
        };

        window.removeBgTrack = (id) => {
            const idx = bgTracks.findIndex(t => t.id === id);
            if (idx > -1) {
                map.removeLayer(bgTracks[idx].layer);
                bgTracks.splice(idx, 1);
                renderBgTracks();
            }
        };

        window.handleGPXUpload = (event) => {
            const files = event.target.files;
            Array.from(files).forEach(file => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const text = e.target.result;
                    const parser = new DOMParser();
                    const xml = parser.parseFromString(text, "text/xml");
                    
                    // 1. Extract WPTs and add them to main route waypoints
                    const wpts = xml.querySelectorAll('wpt');
                    wpts.forEach((wpt, index) => {
                        const lat = parseFloat(wpt.getAttribute('lat'));
                        const lon = parseFloat(wpt.getAttribute('lon'));
                        const nameNode = wpt.querySelector('name');
                        const name = nameNode ? nameNode.textContent : 'Loaded WP';
                        
                        setTimeout(() => {
                            addWaypoint(L.latLng(lat, lon), null, { name });
                        }, index * 10);
                    });
                    
                    // 2. Extract TrkPts as background trace
                    const trkpts = xml.querySelectorAll('trkpt');
                    if (trkpts.length > 0) {
                        const coords = Array.from(trkpts).map(pt => [
                            parseFloat(pt.getAttribute('lat')),
                            parseFloat(pt.getAttribute('lon'))
                        ]);
                        
                        // Generate a distinct random color
                        const hue = Math.floor(Math.random() * 360);
                        const color = `hsl(${hue}, 70%, 50%)`; 
                        
                        const nameNode = xml.querySelector('trk > name');
                        const trackName = nameNode ? nameNode.textContent : file.name;
                        
                        const layer = L.polyline(coords, { color: color, weight: 4, opacity: 0.6, dashArray: '5, 5' }).addTo(map);
                        
                        // Add to state and render
                        bgTracks.push({ id: Date.now().toString() + Math.random().toString(), name: trackName, layer, color });
                        renderBgTracks();
                        map.fitBounds(layer.getBounds());
                    }
                };
                reader.readAsText(file);
            });
            event.target.value = ''; // Reset input
        };

        // --- Fetch Dynamic PTTK Trails (Overpass API) ---
        window.fetchVectorTrails = async () => {
            if (map.getZoom() < 12) {
                setLog("Please zoom in closer (at least level 12) to load vector trails.", true);
                return;
            }
            
            const btn = document.getElementById('btn-fetch-trails');
            const originalText = '<i class="fa-solid fa-map-location-dot mr-1"></i> Fetch PTTK Trails (In View)';
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-1"></i> Loading Data...';
            setLog("Fetching PTTK trails from OpenStreetMap...");

            const bounds = map.getBounds();
            const bbox = `${bounds.getSouth()},${bounds.getWest()},${bounds.getNorth()},${bounds.getEast()}`;
            
            // Query OSM for hiking relations within current view bounds
            const query = `
                [out:json][timeout:25];
                (
                  relation["route"="hiking"](${bbox});
                  relation["route"="foot"](${bbox});
                );
                out geom;
            `;

            // Fallback endpoints in case the main server is overloaded
            const overpassEndpoints = [
                'https://overpass-api.de/api/interpreter',
                'https://overpass.kumi.systems/api/interpreter',
                'https://lz4.overpass-api.de/api/interpreter'
            ];

            let resText = null;
            let success = false;

            for (let endpoint of overpassEndpoints) {
                try {
                    // Implement a strict 10-second timeout to prevent the app from getting stuck
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 10000); 

                    const response = await fetch(endpoint, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: 'data=' + encodeURIComponent(query),
                        signal: controller.signal
                    });
                    
                    clearTimeout(timeoutId);
                    resText = await response.text();
                    
                    if (response.ok) {
                        success = true;
                        break; 
                    }
                } catch (e) {
                    console.warn(`Endpoint ${endpoint} failed or timed out, trying next...`);
                }
            }

            try {
                if (!success || !resText) throw new Error("All Overpass servers are currently busy or unreachable. Try again in a minute.");

                let data;
                try {
                    data = JSON.parse(resText);
                } catch (e) {
                    console.error("Overpass API returned non-JSON:", resText.substring(0, 300));
                    let errMsg = "Overpass API returned an invalid response.";
                    const match = resText.match(/Error<\/strong>: (.*?)<\/p>/i) || resText.match(/<p>(.*?)<\/p>/i);
                    if (match) errMsg = "Overpass API Error: " + match[1].replace(/<[^>]*>?/gm, '').trim();
                    throw new Error(errMsg);
                }
                
                if (!data || !data.elements) throw new Error("Received empty data from OSM.");
                
                pttkTrailsLayer.clearLayers(); 
                
                if (!map.hasLayer(pttkTrailsLayer)) {
                    map.addLayer(pttkTrailsLayer); // Auto-enable the layer so user sees results
                }

                let trailCount = 0;
                data.elements.forEach(rel => {
                    if (rel.type !== 'relation') return;
                    trailCount++;
                    
                    // Parse OSM color tags
                    let colorName = 'blue';
                    if (rel.tags['osmc:symbol']) {
                        colorName = rel.tags['osmc:symbol'].split(':')[0];
                    } else if (rel.tags.colour) {
                        colorName = rel.tags.colour;
                    }
                    
                    const colorMap = {
                        'red': '#ef4444',
                        'blue': '#3b82f6',
                        'green': '#22c55e',
                        'yellow': '#eab308',
                        'black': '#1f2937',
                        'orange': '#f97316'
                    };
                    const hexColor = colorMap[colorName.toLowerCase()] || colorMap['blue'];
                    const trailName = rel.tags.name || rel.tags.ref || 'Hiking Trail';

                    // Draw geometries
                    rel.members.forEach(member => {
                        if (member.type === 'way' && Array.isArray(member.geometry)) {
                            // Safely filter out any null geometries before attempting to draw
                            const validGeom = member.geometry.filter(g => g !== null && g.lat !== undefined && g.lon !== undefined);
                            
                            if (validGeom.length >= 2) {
                                const coords = validGeom.map(g => [g.lat, g.lon]);
                                
                                // Colored dashed stripe with transparent gaps (increased width by 20% from 3 to 3.6)
                                L.polyline(coords, { color: hexColor, weight: 3.6, opacity: 1, dashArray: '6, 6', lineCap: 'butt' })
                                 .bindTooltip(`<span class="font-bold" style="color:${hexColor}">${trailName}</span>`)
                                 .addTo(pttkTrailsLayer);
                            }
                        }
                    });
                });
                
                setLog(`Loaded ${trailCount} PTTK trails in view.`);
            } catch (e) {
                console.error(e);
                setLog(e.message || "Failed to fetch trails from Overpass API.", true);
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        };

        // --- Math & Filtering ---
        function sanitizeElevation(coords) {
            // Fix DEM holes (abrupt drops to exactly 0)
            for (let i = 0; i < coords.length; i++) {
                if (coords[i][2] === 0 || coords[i][2] == null) {
                    let isMissing = false;
                    if (coords[i][2] == null) isMissing = true;
                    else {
                        // Check if neighbors are significantly higher
                        let prevValid = null;
                        for (let j = i - 1; j >= 0; j--) { if (coords[j][2] !== 0) { prevValid = coords[j][2]; break; } }
                        if (prevValid !== null && Math.abs(prevValid - 0) > 20) isMissing = true;
                        
                        if (!isMissing) {
                            let nextValid = null;
                            for (let j = i + 1; j < coords.length; j++) { if (coords[j][2] !== 0) { nextValid = coords[j][2]; break; } }
                            if (nextValid !== null && Math.abs(nextValid - 0) > 20) isMissing = true;
                        }
                    }

                    if (isMissing) {
                        // Interpolate between the nearest valid points
                        let prevEle = null, nextEle = null, prevDist = 0, nextDist = 0;
                        for (let j = i - 1; j >= 0; j--) { if (coords[j][2] != null && coords[j][2] !== 0) { prevEle = coords[j][2]; prevDist = i - j; break; } }
                        for (let j = i + 1; j < coords.length; j++) { if (coords[j][2] != null && coords[j][2] !== 0) { nextEle = coords[j][2]; nextDist = j - i; break; } }
                        
                        if (prevEle !== null && nextEle !== null) {
                            coords[i][2] = prevEle + (nextEle - prevEle) * (prevDist / (prevDist + nextDist));
                        } else if (prevEle !== null) coords[i][2] = prevEle;
                        else if (nextEle !== null) coords[i][2] = nextEle;
                    }
                }
            }
            return coords;
        }

        function calculateElevationGain(coords, prominence = 10) {
            if (coords.length === 0) return 0;
            let gain = 0;
            let min_alt = coords[0][2];
            let max_alt = coords[0][2];

            // Replicates scipy find_peaks topographic prominence hysteresis
            for (let i = 1; i < coords.length; i++) {
                let alt = coords[i][2];
                if (alt < max_alt - prominence) {
                    gain += (max_alt - min_alt);
                    min_alt = alt; 
                    max_alt = alt;
                } else if (alt > max_alt) {
                    max_alt = alt;
                } else if (alt < min_alt) {
                    min_alt = alt;
                }
            }
            if (max_alt > min_alt) {
                gain += (max_alt - min_alt);
            }
            return gain;
        }

        // --- 8. GPX Export Logic ---
        function getDynamicFilename() {
            const clean = str => str.replace(/\s+/g, '_').replace(/[^\p{L}0-9_-]/gu, '').replace(/_+/g, '_').replace(/^_|_$/g, '');
            const startName = waypoints[0] ? clean(waypoints[0].name) : 'Start';
            const endName = waypoints[waypoints.length - 1] ? clean(waypoints[waypoints.length - 1].name) : 'End';
            const dist = Math.round(routeSummary.distance);
            const asc = Math.round(routeSummary.ascent);
            return { startName, endName, dist, asc };
        }

        function downloadBlob(content, filename) {
            const blob = new Blob([content], { type: 'application/gpx+xml' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function generateWPTags() {
            let tags = '';
            waypoints.forEach((wp, i) => {
                const safeName = wp.name.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                tags += `  <wpt lat="${wp.lat}" lon="${wp.lng}">\n    <name>${safeName}</name>\n  </wpt>\n`;
            });
            return tags;
        }

        document.getElementById('btn-export-route').addEventListener('click', () => {
            if (!lastRouteCoords || lastRouteCoords.length === 0) return;
            const info = getDynamicFilename();
            const filename = `${info.endName}_from_${info.startName}_${info.dist}km_${info.asc}m.gpx`;
            
            let gpx = `<?xml version="1.0" encoding="UTF-8"?>\n<gpx version="1.1" creator="MapRouterWeb" xmlns="http://www.topografix.com/GPX/1/1">\n`;
            gpx += generateWPTags();
            
            gpx += `  <trk>\n    <name>${filename.replace('.gpx', '')}</name>\n    <trkseg>\n`;
            lastRouteCoords.forEach(c => {
                gpx += `      <trkpt lat="${c[0]}" lon="${c[1]}">`;
                if (c[2] !== undefined && c[2] !== null) gpx += `<ele>${c[2]}</ele>`; 
                gpx += `</trkpt>\n`;
            });
            gpx += `    </trkseg>\n  </trk>\n</gpx>`;

            downloadBlob(gpx, filename);
        });

        document.getElementById('btn-export-wp').addEventListener('click', () => {
            if (waypoints.length === 0) return;
            const info = getDynamicFilename();
            const filename = `Waypoints_${info.startName}_to_${info.endName}.gpx`;
            
            let gpx = `<?xml version="1.0" encoding="UTF-8"?>\n<gpx version="1.1" creator="MapRouterWeb" xmlns="http://www.topografix.com/GPX/1/1">\n`;
            gpx += generateWPTags();
            gpx += `</gpx>`;

            downloadBlob(gpx, filename);
        });

        // --- 9. Chart & Gradient Logic ---
        function getChartGradient(context, data, opacity) {
            const chart = context.chart;
            const {ctx, chartArea} = chart;
            if (!chartArea) return null;

            // Generate gradient dynamically across chart width
            const gradient = ctx.createLinearGradient(chartArea.left, 0, chartArea.right, 0);
            const totalDist = data[data.length - 1].x;
            const step = Math.max(1, Math.ceil(data.length / 300)); // Limit color stops for performance
            
            for (let i = 0; i < data.length; i += step) {
                let pt = data[i];
                let offset = Math.max(0, Math.min(1, pt.x / totalDist));
                let absSlope = Math.abs(pt.slope || 0); // Calculate absolute slope
                
                let r, g, b;
                if (absSlope >= 30) { 
                    r=239; g=68; b=68; // Red (Hot / Extreme Steepness)
                } else if (absSlope < 10) {
                    // Blue to Green (Cold to Cool / Flat to Mild)
                    let pct = absSlope / 10;
                    r = Math.round(59 + pct * (34 - 59));
                    g = Math.round(130 + pct * (197 - 130));
                    b = Math.round(246 + pct * (94 - 246));
                } else if (absSlope < 20) {
                    // Green to Yellow (Cool to Warm / Moderate steepness)
                    let pct = (absSlope - 10) / 10;
                    r = Math.round(34 + pct * (234 - 34));
                    g = Math.round(197 + pct * (179 - 197));
                    b = Math.round(94 + pct * (8 - 94));
                } else {
                    // Yellow to Red (Warm to Hot / Heavy steepness)
                    let pct = (absSlope - 20) / 10;
                    r = Math.round(234 + pct * (239 - 234));
                    g = Math.round(179 + pct * (68 - 179));
                    b = Math.round(8 + pct * (68 - 8));
                }
                gradient.addColorStop(offset, `rgba(${r},${g},${b},${opacity})`);
            }
            return gradient;
        }

        function renderElevationChart(data) {
            elevationContainer.classList.remove('hidden');

            if (elevationChart) {
                elevationChart.destroy();
            }

            const ctx = document.getElementById('elevationChart').getContext('2d');

            elevationChart = new Chart(ctx, {
                type: 'line',
                data: {
                    datasets: [{
                        label: 'Elevation',
                        data: data,
                        fill: true,
                        tension: 0.1,
                        pointRadius: 0, 
                        pointHoverRadius: 6,
                        borderWidth: 2,
                        borderColor: (context) => getChartGradient(context, data, 1.0),
                        backgroundColor: (context) => getChartGradient(context, data, 0.4)
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false,
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: 'rgba(0,0,0,0.8)',
                            callbacks: {
                                label: function(context) {
                                    let pt = context.raw;
                                    let sign = pt.slope > 0 ? '+' : '';
                                    return `Elevation: ${Math.round(pt.y)} m | Steepness: ${sign}${pt.slope.toFixed(1)}%`;
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            type: 'linear',
                            title: { display: true, text: 'Distance (km)' },
                            ticks: { callback: function(val) { return val.toFixed(1); } }
                        },
                        y: {
                            title: { display: true, text: 'Elevation (m)' }
                        }
                    },
                    onHover: (e, activeElements) => {
                        if (activeElements.length > 0) {
                            const idx = activeElements[0].index;
                            const pt = data[idx];
                            
                            // Move/Create map hover marker (Added to routePane so it sits above trails)
                            if (!mapHoverMarker) {
                                mapHoverMarker = L.circleMarker([pt.lat, pt.lng], {
                                    radius: 6, color: '#2563eb', fillColor: '#fff', fillOpacity: 1, weight: 3,
                                    pane: 'routePane' 
                                }).addTo(map);
                            } else {
                                mapHoverMarker.setLatLng([pt.lat, pt.lng]);
                            }
                        } else if (mapHoverMarker) {
                            map.removeLayer(mapHoverMarker);
                            mapHoverMarker = null;
                        }
                    }
                }
            });
        }

        // --- 10. Routing API Logic ---
        document.getElementById('btn-clear').addEventListener('click', () => {
            waypoints.forEach(wp => map.removeLayer(wp.marker));
            waypoints = [];
            clearRoute();
            renderUI();
            setLog("Map cleared.");
        });

        const sleep = ms => new Promise(r => setTimeout(r, ms));

        document.getElementById('btn-calc').addEventListener('click', async () => {
            if (waypoints.length < 2) return setLog("Not enough waypoints to route.", true);
            
            const btn = document.getElementById('btn-calc');
            btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Loading...';
            
            clearRoute();

            // Restrict Accept header to JSON strictly to prevent GPX/XML responses from OpenRouteService 
            const headers = {
                'Accept': 'application/json, application/geo+json; charset=utf-8',
                'Authorization': API_KEY,
                'Content-Type': 'application/json; charset=utf-8'
            };

            try {
                setLog(`Calculating segment-by-segment routes...`);
                
                for (let i = 0; i < waypoints.length - 1; i++) {
                    const startWp = waypoints[i];
                    const endWp = waypoints[i+1];
                    const url = `https://api.openrouteservice.org/v2/directions/${startWp.profile}/geojson`;
                    
                    const requestAlts = waypoints.length === 2 ? true : startWp.alt;
                    
                    const body = { 
                        coordinates: [[startWp.lng, startWp.lat], [endWp.lng, endWp.lat]], 
                        preference: startWp.pref,
                        elevation: true
                    };

                    if (requestAlts) {
                        body.alternative_routes = { target_count: 3 };
                    }
                    
                    const response = await fetch(url, {
                        method: 'POST', headers: headers,
                        body: JSON.stringify(body)
                    });
                    
                    const resText = await response.text();
                    let data;
                    try {
                        data = JSON.parse(resText);
                    } catch (e) {
                        console.error("Segment API returned non-JSON:", resText.substring(0, 50));
                        throw new Error(`Segment WP${i+1}->WP${i+2} failed: Invalid response format (XML).`);
                    }
                    if (!response.ok) throw new Error(`Segment WP${i+1}->WP${i+2} failed: ${data.error?.message || "Unknown error"}`);

                    let segAlts = data.features.map((feature) => {
                        let coords = feature.geometry.coordinates.map(c => [c[1], c[0], c[2]]);
                        coords = sanitizeElevation(coords);
                        let asc = calculateElevationGain(coords, 10);
                        let dist = feature.properties.summary.distance / 1000;
                        return { coords, distance: dist, ascent: asc };
                    });

                    fetchedSegments.push(segAlts);
                    selectedAltIndices.push(0); // Default to primary route (0) for this segment
                    
                    await sleep(400); // Respect free API limits
                }

                if (fetchedSegments.length > 0) {
                    drawSelectedRoutes();
                }

            } catch (err) {
                setLog(err.message, true);
            } finally {
                btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-play mr-1"></i> Calculate';
            }
        });

        // --- Draw Selected Routes & Handle Alternatives UI ---
        window.selectSegmentRoute = (segIdx, altIdx) => {
            selectedAltIndices[segIdx] = parseInt(altIdx);
            drawSelectedRoutes();
        };

        function drawSelectedRoutes() {
            if (routeLayer) map.removeLayer(routeLayer);
            altLayers.clearLayers();
            lastRouteCoords = [];
            let totalDistance = 0;

            fetchedSegments.forEach((segmentAlts, segIdx) => {
                const selectedIdx = selectedAltIndices[segIdx];
                
                // Update the Dropdown UI for this segment
                const container = document.getElementById(`alt-dropdown-container-${segIdx}`);
                if (container && segmentAlts.length > 1) {
                    container.classList.remove('hidden');
                    let optionsHtml = segmentAlts.map((alt, altIdx) => {
                        const isSel = altIdx === selectedIdx ? 'selected' : '';
                        const label = altIdx === 0 ? 'Primary' : `Alt ${altIdx}`;
                        return `<option value="${altIdx}" ${isSel}>${label} (${alt.distance.toFixed(1)} km, Asc: ${Math.round(alt.ascent)} m)</option>`;
                    }).join('');
                    
                    container.innerHTML = `<select onchange="selectSegmentRoute(${segIdx}, this.value)" class="w-full p-1 border border-blue-300 rounded bg-blue-50 text-xs font-bold text-blue-800">${optionsHtml}</select>`;
                } else if (container) {
                    container.classList.add('hidden');
                    container.innerHTML = '';
                }

                // 1. Draw alternative orange routes first (so the red one is painted on top)
                segmentAlts.forEach((alt, altIdx) => {
                    if (altIdx !== selectedIdx) {
                        const altLine = L.polyline(alt.coords.map(c => [c[0], c[1]]), {
                            color: 'orange', weight: 3, opacity: 0.8, pane: 'routePane'
                        }).addTo(altLayers);
                        
                        // Allow user to click the orange line directly on the map to switch to it
                        altLine.on('click', () => selectSegmentRoute(segIdx, altIdx));
                    }
                });

                // 2. Stitch the primary active red route segment
                const activeAlt = segmentAlts[selectedIdx];
                let segCoords = [...activeAlt.coords];
                
                if (segIdx > 0 && lastRouteCoords.length > 0 && segCoords.length > 0) {
                    const lastPt = lastRouteCoords[lastRouteCoords.length - 1];
                    if (lastPt[0] === segCoords[0][0] && lastPt[1] === segCoords[0][1]) {
                        segCoords.shift();
                    }
                }
                lastRouteCoords.push(...segCoords);
                totalDistance += activeAlt.distance;
            });

            // Calculate final accurate ascent over the stitched combination
            let totalAscent = calculateElevationGain(lastRouteCoords, 10);
            routeSummary = { distance: totalDistance, ascent: totalAscent };

            // Draw the full combined red route
            routeLayer = L.polyline(lastRouteCoords.map(c => [c[0], c[1]]), { 
                color: 'red', weight: 5, opacity: 0.8, pane: 'routePane' 
            }).addTo(map);

            // --- Generate Data for Elevation Chart ---
            chartData = [];
            let cumDist = 0;
            for(let i = 0; i < lastRouteCoords.length; i++) {
                let pt = lastRouteCoords[i];
                if(i > 0) {
                    let prev = lastRouteCoords[i-1];
                    let dist = map.distance([prev[0], prev[1]], [pt[0], pt[1]]);
                    cumDist += dist / 1000; // Track cumulative km
                }
                chartData.push({ x: cumDist, y: pt[2] || 0, lat: pt[0], lng: pt[1] });
            }
            
            // Calculate raw steepness slope %
            let rawSlopes = [];
            for(let i = 0; i < chartData.length; i++) {
                if (i < chartData.length - 1) {
                    let dx = chartData[i+1].x - chartData[i].x; // km
                    let dy = chartData[i+1].y - chartData[i].y; // m
                    rawSlopes.push(dx > 0 ? (dy / (dx * 10)) : 0);
                } else {
                    rawSlopes.push(rawSlopes[i-1] || 0);
                }
            }
            
            // Apply 5-point running average to smooth the steepness coloring
            const windowSize = 5;
            const halfWindow = Math.floor(windowSize / 2);
            for(let i = 0; i < chartData.length; i++) {
                let sum = 0;
                let count = 0;
                for(let j = Math.max(0, i - halfWindow); j <= Math.min(chartData.length - 1, i + halfWindow); j++) {
                    sum += rawSlopes[j];
                    count++;
                }
                chartData[i].slope = sum / count;
            }
            
            renderElevationChart(chartData);
            // -----------------------------------------

            setLog(`Success! Dist: ${totalDistance.toFixed(1)} km, Asc: ${Math.round(totalAscent)} m`);
            exportContainer.classList.remove('hidden');
            document.getElementById('btn-export-route').classList.remove('hidden');
        }

        // Initialize state on load
        loadState();

    </script>
</body>
</html>
