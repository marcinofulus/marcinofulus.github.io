<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Outdoor Map Router</title>
    
    <!-- Leaflet CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Hide Leaflet's default DivIcon styling so our custom SVG looks good */
        .leaflet-div-icon {
            background: transparent !important;
            border: none !important;
        }
        /* Ensure the app takes full screen */
        body, html { height: 100%; margin: 0; padding: 0; }
        
        /* Custom scrollbar for sidebar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="flex flex-col md:flex-row h-screen bg-gray-50 overflow-hidden text-sm">

    <!-- SIDEBAR -->
    <div class="w-full md:w-96 flex flex-col h-[45vh] md:h-full bg-white shadow-xl z-[1000] border-r border-gray-200">
        <!-- Header & Controls -->
        <div class="p-4 bg-gray-50 border-b border-gray-200 flex-shrink-0">
            <h1 class="text-xl font-bold text-gray-800 mb-4"><i class="fa-solid fa-route text-blue-600 mr-2"></i>Map Router</h1>
            
            <div class="space-y-3">
                <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-1">Default Profile:</label>
                    <select id="default-profile" class="w-full p-2 border rounded bg-white">
                        <option value="foot-hiking">Hiking (Prefers Trails)</option>
                        <option value="cycling-mountain" selected>Mountain Biking (MTB)</option>
                        <option value="cycling-regular">Regular Cycling</option>
                        <option value="foot-walking">Walking (Urban)</option>
                    </select>
                </div>
                
                <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-1">Default Priority:</label>
                    <select id="default-pref" class="w-full p-2 border rounded bg-white">
                        <option value="recommended">Recommended (Trails)</option>
                        <option value="shortest" selected>Shortest Distance</option>
                        <option value="fastest">Fastest Time</option>
                    </select>
                </div>

                <div class="flex items-center mt-2">
                    <input type="checkbox" id="smart-insert" class="w-4 h-4 text-blue-600 rounded border-gray-300">
                    <label for="smart-insert" class="ml-2 text-sm text-gray-700">Smart Insert along route</label>
                </div>

                <div class="grid grid-cols-2 gap-2 mt-4">
                    <button id="btn-calc" class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded transition">
                        <i class="fa-solid fa-play mr-1"></i> Calculate
                    </button>
                    <button id="btn-clear" class="bg-red-500 hover:bg-red-600 text-white font-bold py-2 px-4 rounded transition">
                        <i class="fa-solid fa-trash mr-1"></i> Clear All
                    </button>
                </div>
                
                <!-- Dual Export Buttons Container -->
                <div id="export-container" class="grid grid-cols-2 gap-2 mt-2 hidden">
                    <button id="btn-export-route" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-2 rounded transition text-xs shadow">
                        <i class="fa-solid fa-download mr-1"></i> Route GPX
                    </button>
                    <button id="btn-export-wp" class="bg-indigo-500 hover:bg-indigo-600 text-white font-bold py-2 px-2 rounded transition text-xs shadow">
                        <i class="fa-solid fa-location-dot mr-1"></i> WPs Only
                    </button>
                </div>
            </div>
            
            <div id="output-log" class="mt-3 text-xs text-gray-600 font-mono h-6 overflow-hidden">Ready. Click map to add waypoints.</div>
        </div>

        <!-- Waypoint List -->
        <div class="flex-1 overflow-y-auto p-4" id="wp-list">
            <!-- JS will populate rows here -->
        </div>
    </div>

    <!-- MAP AREA -->
    <div id="map" class="flex-1 h-[55vh] md:h-full relative z-10"></div>

    <!-- APPLICATION LOGIC -->
    <script>
        // --- 1. Global State & Config ---
        const API_KEY = 'eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6IjlhZWQ0OGIzOWQ4MzQ5MTFhNzllNWRiOTllN2RmNWFjIiwiaCI6Im11cm11cjY0In0=';
        let waypoints = []; // Array of { lat, lng, profile, pref, name, marker }
        let routeLayer = null;
        let lastRouteCoords = []; // Used for GPX export [lat, lng, ele]
        let routeSummary = { distance: 0, ascent: 0 }; // Store metrics for filename

        // --- 2. Map Initialization ---
        const map = L.map('map').setView([49.7395, 18.9953], 14);
        L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
            maxZoom: 17,
            attribution: 'Map data: &copy; OpenStreetMap contributors, SRTM | Map style: &copy; OpenTopoMap'
        }).addTo(map);

        // --- 3. UI Element Bindings ---
        const uiList = document.getElementById('wp-list');
        const defaultProfile = document.getElementById('default-profile');
        const defaultPref = document.getElementById('default-pref');
        const smartInsert = document.getElementById('smart-insert');
        const log = document.getElementById('output-log');
        const exportContainer = document.getElementById('export-container');

        function setLog(msg, isError = false) {
            log.innerHTML = `<span class="${isError ? 'text-red-600 font-bold' : ''}">${msg}</span>`;
            console.log(msg);
        }

        // --- 4. Math Helper ---
        function pointToSegmentDist2(p, v, w) {
            const l2 = Math.pow(v.lat - w.lat, 2) + Math.pow(v.lng - w.lng, 2);
            if (l2 === 0) return Math.pow(p.lat - v.lat, 2) + Math.pow(p.lng - v.lng, 2);
            let t = ((p.lat - v.lat) * (w.lat - v.lat) + (p.lng - v.lng) * (w.lng - v.lng)) / l2;
            t = Math.max(0, Math.min(1, t));
            const projLat = v.lat + t * (w.lat - v.lat);
            const projLng = v.lng + t * (w.lng - v.lng);
            return Math.pow(p.lat - projLat, 2) + Math.pow(p.lng - projLng, 2);
        }

        // --- 5. Waypoint Management ---
        function createNumberedIcon(number) {
            const numStr = number.toString().padStart(2, '0');
            const htmlContent = `
                <div style="position: relative; width: 30px; height: 42px;">
                    <svg viewBox="0 0 30 42" style="position: absolute; left: 0; top: 0; width: 30px; height: 42px; filter: drop-shadow(0px 3px 2px rgba(0,0,0,0.5));">
                        <path d="M15 2C7.8 2 2 7.8 2 15c0 9.5 13 25 13 25s13-15.5 13-25C28 7.8 22.2 2 15 2z" fill="#0078A8" stroke="white" stroke-width="2"/>
                    </svg>
                    <div style="position: absolute; top: 7px; left: 0; width: 30px; text-align: center; color: white; font-weight: bold; font-family: Arial, sans-serif; font-size: 13px; pointer-events: none;">
                        ${numStr}
                    </div>
                </div>
            `;
            return L.divIcon({ html: htmlContent, iconSize: [30, 42], iconAnchor: [15, 42] });
        }

        function updateMarkerIcons() {
            waypoints.forEach((wp, i) => {
                wp.marker.setIcon(createNumberedIcon(i + 1));
            });
        }

        function clearRoute() {
            if (routeLayer) map.removeLayer(routeLayer);
            routeLayer = null;
            lastRouteCoords = [];
            routeSummary = { distance: 0, ascent: 0 };
            exportContainer.classList.add('hidden'); // Hide export buttons
        }

        async function fetchLocationName(wpData) {
            try {
                // Reverse geocoding using OpenRouteService API
                const url = `https://api.openrouteservice.org/geocode/reverse?api_key=${API_KEY}&point.lon=${wpData.lng}&point.lat=${wpData.lat}&size=1`;
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.features && data.features.length > 0) {
                    const props = data.features[0].properties;
                    // Attempt to extract the most logical name/landmark
                    wpData.name = props.name || props.street || props.locality || (props.label ? props.label.split(',')[0] : `WP ${waypoints.indexOf(wpData) + 1}`);
                    
                    if (wpData.marker.getTooltip()) {
                        wpData.marker.setTooltipContent(wpData.name);
                    }
                    renderUI(); // Re-render the sidebar to show new name
                }
            } catch (e) {
                console.error("Reverse geocoding failed", e);
            }
        }

        function renderUI() {
            uiList.innerHTML = '';
            waypoints.forEach((wp, i) => {
                const isLast = i === waypoints.length - 1;
                
                const div = document.createElement('div');
                div.className = 'mb-3 bg-white border border-gray-200 rounded shadow-sm p-2';
                
                // Top row: Editable Label + Buttons
                let row1 = `
                    <div class="flex justify-between items-center mb-2">
                        <div class="flex-1 mr-2 overflow-hidden">
                            <input type="text" value="${wp.name.replace(/"/g, '&quot;')}" onchange="updateWpName(${i}, this.value)" class="font-bold text-gray-800 w-full bg-transparent border-b border-dashed border-gray-300 focus:border-blue-500 focus:outline-none focus:bg-blue-50 transition-colors px-1 text-sm" title="Edit name" placeholder="Waypoint Name">
                            <div class="text-[10px] text-gray-400 font-normal px-1 mt-1">${wp.lat.toFixed(4)}, ${wp.lng.toFixed(4)}</div>
                        </div>
                        <div class="flex space-x-1 flex-shrink-0">
                            <button onclick="moveWp(${i}, -1)" ${i === 0 ? 'disabled' : ''} class="p-1 w-8 h-8 bg-gray-100 hover:bg-gray-200 rounded disabled:opacity-30"><i class="fa-solid fa-arrow-up"></i></button>
                            <button onclick="moveWp(${i}, 1)" ${isLast ? 'disabled' : ''} class="p-1 w-8 h-8 bg-gray-100 hover:bg-gray-200 rounded disabled:opacity-30"><i class="fa-solid fa-arrow-down"></i></button>
                            <button onclick="removeWp(${i})" class="p-1 w-8 h-8 bg-red-100 hover:bg-red-200 text-red-600 rounded"><i class="fa-solid fa-xmark"></i></button>
                        </div>
                    </div>
                `;

                // Bottom row: Segments (if not last)
                let row2 = '';
                if (!isLast) {
                    row2 = `
                        <div class="flex items-center text-xs bg-gray-50 p-1 rounded border border-dashed border-gray-300">
                            <span class="text-gray-500 w-16">&rarr; to next:</span>
                            <select onchange="updateWp(${i}, 'profile', this.value)" class="flex-1 p-1 mr-1 border rounded bg-white">
                                <option value="foot-hiking" ${wp.profile === 'foot-hiking' ? 'selected' : ''}>Hike</option>
                                <option value="cycling-mountain" ${wp.profile === 'cycling-mountain' ? 'selected' : ''}>MTB</option>
                                <option value="cycling-regular" ${wp.profile === 'cycling-regular' ? 'selected' : ''}>Cycle</option>
                                <option value="foot-walking" ${wp.profile === 'foot-walking' ? 'selected' : ''}>Walk</option>
                            </select>
                            <select onchange="updateWp(${i}, 'pref', this.value)" class="w-20 p-1 border rounded bg-white">
                                <option value="recommended" ${wp.pref === 'recommended' ? 'selected' : ''}>Rec</option>
                                <option value="shortest" ${wp.pref === 'shortest' ? 'selected' : ''}>Short</option>
                                <option value="fastest" ${wp.pref === 'fastest' ? 'selected' : ''}>Fast</option>
                            </select>
                        </div>
                    `;
                }

                div.innerHTML = row1 + row2;
                uiList.appendChild(div);
            });
            saveState(); // Save to localStorage on every UI render
        }

        // Exposed global functions for inline HTML event handlers
        window.updateWp = (idx, key, val) => { waypoints[idx][key] = val; clearRoute(); saveState(); };
        window.updateWpName = (idx, val) => { 
            waypoints[idx].name = val; 
            waypoints[idx].marker.setTooltipContent(val);
            saveState(); 
        };
        window.removeWp = (idx) => { map.removeLayer(waypoints[idx].marker); waypoints.splice(idx, 1); updateMarkerIcons(); clearRoute(); renderUI(); };
        window.moveWp = (idx, dir) => {
            const target = idx + dir;
            if (target >= 0 && target < waypoints.length) {
                [waypoints[idx], waypoints[target]] = [waypoints[target], waypoints[idx]];
                updateMarkerIcons(); clearRoute(); renderUI();
            }
        };

        function addWaypoint(latlng, index = null, existingData = null) {
            const marker = L.marker(latlng, { draggable: true }).addTo(map);
            
            marker.on('dragstart', () => clearRoute());
            marker.on('dragend', (e) => {
                const wpIdx = waypoints.findIndex(w => w.marker === marker);
                if (wpIdx > -1) {
                    const newPos = e.target.getLatLng();
                    waypoints[wpIdx].lat = newPos.lat;
                    waypoints[wpIdx].lng = newPos.lng;
                    renderUI(); // Updates coordinates in UI
                    fetchLocationName(waypoints[wpIdx]); // Fetch new name based on new location
                }
            });

            const defaultName = existingData && existingData.name ? existingData.name : `Loading...`;
            
            // Add a tooltip to the marker for the name
            marker.bindTooltip(defaultName, { 
                direction: 'right', 
                offset: [15, -20],
                className: 'font-bold bg-white/90 shadow-sm border-0 rounded px-2 py-1 text-xs' 
            });

            const wpData = {
                lat: latlng.lat,
                lng: latlng.lng,
                profile: existingData ? existingData.profile : defaultProfile.value,
                pref: existingData ? existingData.pref : defaultPref.value,
                name: defaultName,
                marker: marker
            };

            if (index === null || index >= waypoints.length) {
                waypoints.push(wpData);
            } else {
                waypoints.splice(index, 0, wpData);
            }

            updateMarkerIcons();
            clearRoute();
            renderUI();

            // Auto-fetch landmark name if it's a freshly placed waypoint
            if (!existingData || !existingData.name) {
                fetchLocationName(wpData);
            }
        }

        // --- 6. Map Interaction ---
        map.on('click', function(e) {
            const p = e.latlng;
            if (waypoints.length < 2 || !smartInsert.checked) {
                addWaypoint(p);
                return;
            }

            let minDist = Infinity;
            let bestInsertIdx = waypoints.length;

            for (let i = 0; i < waypoints.length - 1; i++) {
                const d = pointToSegmentDist2(p, waypoints[i], waypoints[i+1]);
                if (d < minDist) {
                    minDist = d;
                    bestInsertIdx = i + 1;
                }
            }
            
            const lastWp = waypoints[waypoints.length - 1];
            const endDist = Math.pow(p.lat - lastWp.lat, 2) + Math.pow(p.lng - lastWp.lng, 2);
            if (endDist < minDist) bestInsertIdx = waypoints.length;

            addWaypoint(p, bestInsertIdx);
        });

        // --- 7. Local Storage (Cookies Replacement) ---
        function saveState() {
            // Strip out the Leaflet marker object to save as pure JSON string
            const safeData = waypoints.map(wp => ({ lat: wp.lat, lng: wp.lng, profile: wp.profile, pref: wp.pref, name: wp.name }));
            localStorage.setItem('mapRouterState', JSON.stringify(safeData));
        }

        function loadState() {
            const saved = localStorage.getItem('mapRouterState');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    data.forEach(wp => addWaypoint(L.latLng(wp.lat, wp.lng), null, wp));
                    if(waypoints.length > 0) map.panTo([waypoints[0].lat, waypoints[0].lng]);
                    setLog("Loaded saved session.");
                    // Unhide WPs Only button if we have loaded points
                    if(waypoints.length > 0) {
                        exportContainer.classList.remove('hidden');
                        document.getElementById('btn-export-route').classList.add('hidden'); // Hide route until calculated
                    }
                } catch (e) {
                    console.error("Error loading state", e);
                }
            }
        }

        // --- 8. GPX Export Logic ---
        function getDynamicFilename() {
            // Regex \p{L} grabs all native alphabet letters (including Polish ą,ć,ę,ł,ń,ó,ś,ź,ż)
            const clean = str => str.replace(/\s+/g, '_').replace(/[^\p{L}0-9_-]/gu, '').replace(/_+/g, '_').replace(/^_|_$/g, '');
            const startName = waypoints[0] ? clean(waypoints[0].name) : 'Start';
            const endName = waypoints[waypoints.length - 1] ? clean(waypoints[waypoints.length - 1].name) : 'End';
            const dist = Math.round(routeSummary.distance);
            const asc = Math.round(routeSummary.ascent);
            return { startName, endName, dist, asc };
        }

        function downloadBlob(content, filename) {
            const blob = new Blob([content], { type: 'application/gpx+xml' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function generateWPTags() {
            let tags = '';
            waypoints.forEach((wp, i) => {
                const safeName = wp.name.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                tags += `  <wpt lat="${wp.lat}" lon="${wp.lng}">\n    <name>${safeName}</name>\n  </wpt>\n`;
            });
            return tags;
        }

        // Export 1: Route + Embedded Waypoints
        document.getElementById('btn-export-route').addEventListener('click', () => {
            if (!lastRouteCoords || lastRouteCoords.length === 0) return;
            const info = getDynamicFilename();
            const filename = `${info.endName}_from_${info.startName}_${info.dist}km_${info.asc}m.gpx`;
            
            let gpx = `<?xml version="1.0" encoding="UTF-8"?>\n<gpx version="1.1" creator="MapRouterWeb" xmlns="http://www.topografix.com/GPX/1/1">\n`;
            gpx += generateWPTags();
            
            gpx += `  <trk>\n    <name>${filename.replace('.gpx', '')}</name>\n    <trkseg>\n`;
            lastRouteCoords.forEach(c => {
                gpx += `      <trkpt lat="${c[0]}" lon="${c[1]}">`;
                if (c[2] !== undefined && c[2] !== null) gpx += `<ele>${c[2]}</ele>`; // Add altitude if present
                gpx += `</trkpt>\n`;
            });
            gpx += `    </trkseg>\n  </trk>\n</gpx>`;

            downloadBlob(gpx, filename);
        });

        // Export 2: Waypoints Only
        document.getElementById('btn-export-wp').addEventListener('click', () => {
            if (waypoints.length === 0) return;
            const info = getDynamicFilename();
            const filename = `Waypoints_${info.startName}_to_${info.endName}.gpx`;
            
            let gpx = `<?xml version="1.0" encoding="UTF-8"?>\n<gpx version="1.1" creator="MapRouterWeb" xmlns="http://www.topografix.com/GPX/1/1">\n`;
            gpx += generateWPTags();
            gpx += `</gpx>`;

            downloadBlob(gpx, filename);
        });

        // --- 9. Routing API Logic ---
        document.getElementById('btn-clear').addEventListener('click', () => {
            waypoints.forEach(wp => map.removeLayer(wp.marker));
            waypoints = [];
            clearRoute();
            renderUI();
            setLog("Map cleared.");
        });

        const sleep = ms => new Promise(r => setTimeout(r, ms));

        document.getElementById('btn-calc').addEventListener('click', async () => {
            if (waypoints.length < 2) return setLog("Not enough waypoints to route.", true);
            
            const btn = document.getElementById('btn-calc');
            btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Loading...';
            
            clearRoute();
            lastRouteCoords = [];
            let totalDistance = 0;
            let totalAscent = 0;

            const headers = {
                'Accept': 'application/json, application/geo+json, application/gpx+xml, img/png; charset=utf-8',
                'Authorization': API_KEY,
                'Content-Type': 'application/json; charset=utf-8'
            };

            const profiles = new Set(waypoints.slice(0, -1).map(wp => wp.profile));
            const prefs = new Set(waypoints.slice(0, -1).map(wp => wp.pref));

            try {
                if (profiles.size === 1 && prefs.size === 1) {
                    setLog(`Calculating unified route with elevation...`);
                    const coordsList = waypoints.map(wp => [wp.lng, wp.lat]);
                    const url = `https://api.openrouteservice.org/v2/directions/${Array.from(profiles)[0]}/geojson`;
                    
                    const response = await fetch(url, {
                        method: 'POST', headers: headers,
                        // Request elevation data from ORS
                        body: JSON.stringify({ coordinates: coordsList, preference: Array.from(prefs)[0], elevation: true })
                    });
                    
                    const data = await response.json();
                    if (!response.ok) throw new Error(data.error?.message || "Unknown API error");

                    const geoJsonCoords = data.features[0].geometry.coordinates;
                    // Format is [lon, lat, alt] -> Save as [lat, lng, alt]
                    lastRouteCoords = geoJsonCoords.map(c => [c[1], c[0], c[2]]); 
                    totalDistance = data.features[0].properties.summary.distance / 1000;

                } else {
                    setLog(`Calculating multi-modal route (Segment by segment)...`);
                    
                    for (let i = 0; i < waypoints.length - 1; i++) {
                        const startWp = waypoints[i];
                        const endWp = waypoints[i+1];
                        const url = `https://api.openrouteservice.org/v2/directions/${startWp.profile}/geojson`;
                        
                        const response = await fetch(url, {
                            method: 'POST', headers: headers,
                            // Request elevation data from ORS
                            body: JSON.stringify({ 
                                coordinates: [[startWp.lng, startWp.lat], [endWp.lng, endWp.lat]], 
                                preference: startWp.pref,
                                elevation: true
                            })
                        });
                        
                        const data = await response.json();
                        if (!response.ok) throw new Error(`Segment WP${i+1}->WP${i+2} failed: ${data.error?.message || "Unknown error"}`);

                        let segCoords = data.features[0].geometry.coordinates.map(c => [c[1], c[0], c[2]]);
                        
                        // Prevent duplicating the coordinate at the joint of segments
                        if (i > 0 && lastRouteCoords.length > 0 && segCoords.length > 0) {
                            const lastPt = lastRouteCoords[lastRouteCoords.length - 1];
                            if (lastPt[0] === segCoords[0][0] && lastPt[1] === segCoords[0][1]) {
                                segCoords.shift();
                            }
                        }
                        
                        lastRouteCoords.push(...segCoords);
                        totalDistance += data.features[0].properties.summary.distance / 1000;
                        
                        await sleep(400); // Respect free API rate limits
                    }
                }

                // Draw final route
                if (lastRouteCoords.length > 0) {
                    // Calculate total ascent manually from 3D coordinates
                    totalAscent = 0;
                    for (let i = 1; i < lastRouteCoords.length; i++) {
                        const ele1 = lastRouteCoords[i-1][2];
                        const ele2 = lastRouteCoords[i][2];
                        if (ele1 !== undefined && ele2 !== undefined && ele2 > ele1) {
                            totalAscent += (ele2 - ele1);
                        }
                    }

                    routeSummary = { distance: totalDistance, ascent: totalAscent };
                    // Tell Leaflet to draw just lat/lng (it naturally ignores the 3rd alt dimension)
                    routeLayer = L.polyline(lastRouteCoords.map(c => [c[0], c[1]]), { color: 'red', weight: 5, opacity: 0.8 }).addTo(map);
                    
                    setLog(`Success! Dist: ${totalDistance.toFixed(1)} km, Asc: ${Math.round(totalAscent)} m`);
                    
                    exportContainer.classList.remove('hidden'); // Show both buttons
                    document.getElementById('btn-export-route').classList.remove('hidden'); // Ensure route button is visible
                }

            } catch (err) {
                setLog(err.message, true);
            } finally {
                btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-play mr-1"></i> Calculate';
            }
        });

        // Initialize state on load
        loadState();

    </script>
</body>
</html>
