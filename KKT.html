<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zaawansowana Optymalizacja Nieliniowa (Lagrange i KKT)</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  
  <!-- Babel (do kompilacji JSX w locie w przeglądarce) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    function App() {
      const [c, setC] = useState(0);
      const [mode, setMode] = useState('lagrange'); // 'lagrange' lub 'kkt'
      const [conditionEnabled, setConditionEnabled] = useState(true); // Nowy stan do wyłączania warunku
      const [hoverInfo, setHoverInfo] = useState(null); // Stan dla podglądu f(x,y) pod kursorem
      
      const bgCanvasRef = useRef(null);
      const fgCanvasRef = useRef(null);

      // Wymiary i mapowanie (50 pikseli = 1 jednostka, zakres od -4 do 4)
      const width = 400;
      const height = 400;
      const scale = 50; 
      const mapX = (x) => width / 2 + x * scale;
      const mapY = (y) => height / 2 - y * scale;

      // Funkcja celu
      const f = (x, y) => Math.pow(x, 4)/4 + Math.pow(x, 3)/3 - 3*x*x + y*y;

      // --- LOGIKA I OBLICZENIA (Wydzielone do useMemo dla wydajności) ---
      const results = useMemo(() => {
        let optX = 0, optY = 0, lambdaMu = 0, isActive = false;

        // Przypadek, gdy warunek jest całkowicie wyłączony
        if (!conditionEnabled) {
          return {
            optX: -3,
            optY: 0,
            lambdaMu: 0,
            isActive: false,
            gradFx: 0, gradFy: 0, gradGx: 0, gradGy: 0
          };
        }

        // 1. Znalezienie optymalnego punktu na linii x + y = c (dla obu trybów)
        // Skanujemy linię (brute-force z dużą gęstością), aby uniknąć utknięcia w lokalnym minimum na linii
        let bestBoundX = 0;
        let minBoundVal = Infinity;
        for (let x = -5; x <= 5; x += 0.01) {
          let y = c - x;
          let val = f(x, y);
          if (val < minBoundVal) {
            minBoundVal = val;
            bestBoundX = x;
          }
        }
        
        // Doprecyzowanie metodą Newtona-Raphsona dla funkcji jednej zmiennej
        // f_bound(x) = x^4/4 + x^3/3 - 3x^2 + (c-x)^2
        // f_bound'(x) = x^3 + x^2 - 6x - 2(c-x) = x^3 + x^2 - 4x - 2c
        let x = bestBoundX;
        for (let i = 0; i < 10; i++) {
          let gx = Math.pow(x,3) + Math.pow(x,2) - 4*x - 2*c;
          let dgx = 3*x*x + 2*x - 4;
          if (Math.abs(dgx) > 0.0001) x = x - gx / dgx;
        }
        
        let boundOptX = x;
        let boundOptY = c - x;
        let boundLambda = 2 * boundOptY; // z df/dy = 2y = lambda

        if (mode === 'lagrange') {
          optX = boundOptX;
          optY = boundOptY;
          lambdaMu = boundLambda;
          isActive = true;
        } else {
          // W KKT (x + y >= c) sprawdzamy najpierw czy minima swobodne leżą w dozwolonej strefie
          const globalMinX = -3, globalMinY = 0;
          const localMinX = 2, localMinY = 0;
          
          const isGlobalValid = (globalMinX + globalMinY >= c);
          const isLocalValid = (localMinX + localMinY >= c);
          
          let bestValidUnconstrainedVal = Infinity;
          let uX = null, uY = null;

          if (isGlobalValid) {
            bestValidUnconstrainedVal = f(globalMinX, globalMinY); // ok. -15.75
            uX = globalMinX; uY = globalMinY;
          } else if (isLocalValid) {
            bestValidUnconstrainedVal = f(localMinX, localMinY); // ok. -5.33
            uX = localMinX; uY = localMinY;
          }

          let boundVal = f(boundOptX, boundOptY);

          // Czy minimum wewnątrz obszaru jest lepsze niż najlepsze na granicy?
          if (uX !== null && bestValidUnconstrainedVal < boundVal) {
            optX = uX;
            optY = uY;
            lambdaMu = 0;
            isActive = false;
          } else {
            optX = boundOptX;
            optY = boundOptY;
            lambdaMu = boundLambda;
            isActive = true;
          }
        }

        // Obliczanie gradientów (tylko do rysowania)
        const gradFx = Math.pow(optX, 3) + Math.pow(optX, 2) - 6*optX;
        const gradFy = 2 * optY;
        const gradGx = mode === 'lagrange' ? 1 : -1;
        const gradGy = mode === 'lagrange' ? 1 : -1;

        return { optX, optY, lambdaMu, isActive, gradFx, gradFy, gradGx, gradGy };
      }, [c, mode, conditionEnabled]);

      // --- RENDEROWANIE TŁA (MAPA CIEPLNA) - TYLKO RAZ ---
      useEffect(() => {
        const canvas = bgCanvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const imgData = ctx.createImageData(width, height);

        for (let py = 0; py < height; py++) {
          for (let px = 0; px < width; px++) {
            let x = (px - width / 2) / scale;
            let y = (height / 2 - py) / scale;
            let val = f(x, y);

            // Mapowanie wartości na kolor (od ok -16 do 50)
            let t = (val + 16) / 66; 
            t = Math.max(0, Math.min(1, t)); // clamp

            // Kolory: Ciemny fiolet -> Niebieski -> Cyjan -> Żółty
            let r = Math.floor(255 * t);
            let g = Math.floor(255 * (t > 0.5 ? 1 : t * 2));
            let b = Math.floor(255 * (1 - t));

            // Rysowanie warstwic (izolinii)
            if (Math.abs((val + 16) % 5) < 0.2) {
              r = g = b = 255; // Białe linie
            }

            let idx = (py * width + px) * 4;
            imgData.data[idx] = r;
            imgData.data[idx + 1] = g;
            imgData.data[idx + 2] = b;
            imgData.data[idx + 3] = 255;
          }
        }
        ctx.putImageData(imgData, 0, 0);
      }, []); // Pusta tablica zależności = odpala się raz

      // --- RENDEROWANIE DYNAMICZNYCH ELEMENTÓW (LINIE, WEKTORY) ---
      useEffect(() => {
        const canvas = fgCanvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, width, height);

        // Rysowanie osi X i Y
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)'; // Półprzezroczyste białe linie
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(0, mapY(0)); ctx.lineTo(width, mapY(0)); // Oś X
        ctx.moveTo(mapX(0), 0); ctx.lineTo(mapX(0), height); // Oś Y
        ctx.stroke();

        // Etykiety osi
        ctx.fillStyle = 'white';
        ctx.font = 'bold 14px sans-serif';
        ctx.shadowColor = 'rgba(0,0,0,0.8)';
        ctx.shadowBlur = 4;
        ctx.fillText('X', width - 20, mapY(0) - 10);
        ctx.fillText('Y', mapX(0) + 10, 20);
        ctx.shadowBlur = 0; // reset cienia

        // Funkcja rysująca strzałki
        const drawArrow = (fromX, fromY, toX, toY, color) => {
          const headlen = 10;
          const dx = toX - fromX;
          const dy = toY - fromY;
          const angle = Math.atan2(dy, dx);
          ctx.beginPath();
          ctx.moveTo(fromX, fromY);
          ctx.lineTo(toX, toY);
          ctx.lineTo(toX - headlen * Math.cos(angle - Math.PI / 6), toY - headlen * Math.sin(angle - Math.PI / 6));
          ctx.moveTo(toX, toY);
          ctx.lineTo(toX - headlen * Math.cos(angle + Math.PI / 6), toY - headlen * Math.sin(angle + Math.PI / 6));
          ctx.strokeStyle = color;
          ctx.lineWidth = 3;
          ctx.stroke();
        };

        // Rysowanie strefy niedozwolonej dla KKT
        if (conditionEnabled && mode === 'kkt') {
          ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
          ctx.beginPath();
          ctx.moveTo(mapX(-10), mapY(c - (-10)));
          ctx.lineTo(mapX(10), mapY(c - 10));
          ctx.lineTo(mapX(-10), mapY(-10)); // dolny róg
          ctx.fill();
        }

        // Rysowanie linii warunku (x + y = c)
        if (conditionEnabled) {
          ctx.beginPath();
          ctx.moveTo(mapX(-10), mapY(c - (-10)));
          ctx.lineTo(mapX(10), mapY(c - 10));
          ctx.strokeStyle = mode === 'kkt' ? 'white' : '#ef4444';
          if (mode === 'kkt') ctx.setLineDash([10, 5]);
          else ctx.setLineDash([]);
          ctx.lineWidth = 2;
          ctx.stroke();
          ctx.setLineDash([]);
        }

        // Minima swobodne
        ctx.fillStyle = '#10b981'; // Szmaragdowy (globalne)
        ctx.beginPath(); ctx.arc(mapX(-3), mapY(0), 4, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#eab308'; // Żółty (lokalne)
        ctx.beginPath(); ctx.arc(mapX(2), mapY(0), 4, 0, Math.PI * 2); ctx.fill();

        // Punkt optymalny
        const { optX, optY, isActive, gradFx, gradFy, gradGx, gradGy } = results;
        ctx.fillStyle = 'white';
        ctx.strokeStyle = '#ef4444';
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(mapX(optX), mapY(optY), 6, 0, Math.PI * 2); 
        ctx.fill(); ctx.stroke();

        // Rysowanie gradientów (tylko na granicy)
        if (isActive && conditionEnabled) {
          // Normalizujemy długość wektorów do wyświetlania
          const fLen = Math.hypot(gradFx, gradFy) || 1;
          const gLen = Math.hypot(gradGx, gradGy) || 1;
          const visualLen = 40; // 40 pikseli
          
          const vFx = (gradFx / fLen) * visualLen;
          const vFy = -(gradFy / fLen) * visualLen; // minus bo Y w SVG rośnie w dół
          const vGx = (gradGx / gLen) * visualLen;
          const vGy = -(gradGy / gLen) * visualLen;

          // ∇g (czerwony)
          drawArrow(mapX(optX), mapY(optY), mapX(optX) + vGx, mapY(optY) + vGy, '#ef4444');
          // ∇f (fioletowy)
          drawArrow(mapX(optX), mapY(optY), mapX(optX) + vFx, mapY(optY) + vFy, '#a855f7');
        }

      }, [c, mode, results, conditionEnabled]);

      return (
        <div className="min-h-screen bg-slate-100 p-4 font-sans text-slate-800">
          <div className="max-w-6xl mx-auto bg-white rounded-xl shadow-xl overflow-hidden border border-slate-200">
            
            {/* Nagłówek */}
            <div className="bg-slate-900 p-6 text-white flex flex-col md:flex-row justify-between md:items-center">
              <div>
                <h1 className="text-2xl font-bold mb-1">Zaawansowana Optymalizacja Nieliniowa</h1>
                <p className="text-slate-400 text-sm">
                  Minimalizacja nietrywialnej funkcji: <span className="text-purple-300 font-mono">f(x,y) = ¼x⁴ + ⅓x³ - 3x² + y²</span>
                </p>
              </div>
              
              <div className="mt-4 md:mt-0 flex bg-slate-800 rounded-lg p-1 border border-slate-700">
                <button 
                  onClick={() => setMode('lagrange')}
                  className={`px-4 py-2 text-sm font-medium rounded-md transition-colors ${mode === 'lagrange' ? 'bg-blue-600 text-white' : 'text-slate-400'}`}
                >
                  Lagrange (Równość)
                </button>
                <button 
                  onClick={() => setMode('kkt')}
                  className={`px-4 py-2 text-sm font-medium rounded-md transition-colors ${mode === 'kkt' ? 'bg-emerald-600 text-white' : 'text-slate-400'}`}
                >
                  KKT (Nierówność)
                </button>
              </div>
            </div>

            <div className="flex flex-col lg:flex-row">
              
              {/* Panel lewy: Sterowanie i Algebra */}
              <div className="w-full lg:w-1/2 p-6 border-r border-slate-100 bg-slate-50 flex flex-col h-full">
                
                {/* Suwak i Przełącznik */}
                <div className="mb-6 bg-white p-4 rounded-lg shadow-sm border border-slate-200">
                  <div className="flex justify-between items-center mb-4 pb-4 border-b border-slate-100">
                    <span className="text-sm font-bold text-slate-700">Włącz ograniczenie (warunek)</span>
                    <button 
                      onClick={() => setConditionEnabled(!conditionEnabled)}
                      className={`relative inline-flex h-6 w-11 items-center rounded-full transition-colors ${conditionEnabled ? 'bg-blue-600' : 'bg-slate-300'}`}
                    >
                      <span className={`inline-block h-4 w-4 transform rounded-full bg-white transition-transform ${conditionEnabled ? 'translate-x-6' : 'translate-x-1'}`} />
                    </button>
                  </div>

                  <div className={!conditionEnabled ? 'opacity-40 pointer-events-none transition-opacity' : 'transition-opacity'}>
                    <label className="block text-sm font-bold text-slate-700 mb-3">
                      Położenie granicy (stała <span className="text-red-500 font-mono text-lg">c = {c}</span>)
                    </label>
                    <input
                      type="range" min="-6" max="6" step="0.5" value={c}
                      onChange={(e) => setC(parseFloat(e.target.value))}
                      className="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-blue-600"
                    />
                    <div className="flex justify-between text-xs text-slate-400 mt-2">
                      <span>-6</span><span>0</span><span>6</span>
                    </div>
                  </div>
                </div>

                {/* Informacje o funkcji */}
                <div className="mb-4 text-sm bg-blue-50 p-3 rounded-lg border border-blue-200">
                  <p className="font-semibold text-blue-900 mb-1">Cechy naszej nowej funkcji:</p>
                  <ul className="list-disc pl-5 text-blue-800 space-y-1">
                    <li>Posiada dwa wgłębienia (studnie potencjału).</li>
                    <li><span className="text-emerald-600 font-bold">Min. globalne:</span> x = -3, y = 0 (najgłębsza studnia).</li>
                    <li><span className="text-yellow-600 font-bold">Min. lokalne:</span> x = 2, y = 0 (płytsza studnia).</li>
                  </ul>
                </div>

                {/* Panel Algebry */}
                <div className="flex-1 bg-slate-800 text-slate-200 rounded-lg p-5 shadow-inner overflow-y-auto border border-slate-700 text-sm font-mono">
                  <h3 className="text-emerald-400 font-bold mb-4 uppercase tracking-wider text-xs font-sans">
                    Wyprowadzenie krok po kroku
                  </h3>
                  
                  {!conditionEnabled ? (
                    <div className="space-y-4">
                      <div>
                        <span className="text-slate-400 block mb-1">1. Optymalizacja bez ograniczeń:</span>
                        Szukamy ekstremów funkcji <span className="text-purple-400">f(x,y)</span> ignorując jakiekolwiek warunki zewnętrzne.
                      </div>
                      <div>
                        <span className="text-slate-400 block mb-1">2. Warunek konieczny (Gradient = 0):</span>
                        ∂f/∂x = x³ + x² - 6x = 0<br/>
                        x(x² + x - 6) = 0<br/>
                        x(x - 2)(x + 3) = 0<br/>
                        <br/>
                        ∂f/∂y = 2y = 0  ⇒  <span className="text-yellow-400">y = 0</span>
                      </div>
                      <div>
                        <span className="text-slate-400 block mb-1">3. Punkty krytyczne:</span>
                        Otrzymujemy trzy współrzędne x: 0, 2, oraz -3.<br/>
                        Punkty: (0,0), (2,0), (-3,0).<br/>
                        Najmniejszą wartość funkcja przyjmuje w pkt (-3,0).
                      </div>
                      
                      <div className="pt-3 border-t border-slate-700">
                        <span className="text-slate-400 block mb-2 font-sans font-bold text-xs uppercase">
                          Aktualny wynik z silnika optymalizacyjnego:
                        </span>
                        <div className="bg-slate-900 p-3 rounded border border-slate-600">
                          <p>Optymalny x: <span className="text-white font-bold">{results.optX.toFixed(3)}</span></p>
                          <p>Optymalny y: <span className="text-white font-bold">{results.optY.toFixed(3)}</span></p>
                          <p className="text-emerald-400 mt-1">Brak warunku (λ/μ = N/A)</p>
                        </div>
                      </div>
                    </div>
                  ) : (
                  <div className="space-y-4">
                    <div>
                      <span className="text-slate-400 block mb-1">1. Lagrangian L(x,y,λ):</span>
                      <span className="text-purple-400">¼x⁴ + ⅓x³ - 3x² + y²</span> - λ(<span className="text-red-400">x + y - {c}</span>)
                    </div>
                    <div>
                      <span className="text-slate-400 block mb-1">2. Układ równań (Gradienty = 0):</span>
                      ∂L/∂x = x³ + x² - 6x - λ = 0<br/>
                      ∂L/∂y = 2y - λ = 0  ⇒  <span className="text-yellow-400">λ = 2y</span>
                    </div>
                    <div>
                      <span className="text-slate-400 block mb-1">3. Podstawienie do warunku x+y=c:</span>
                      y = {c} - x<br/>
                      x³ + x² - 6x - 2({c} - x) = 0<br/>
                      x³ + x² - 4x - {2 * c} = 0
                    </div>
                    
                    <div className="pt-3 border-t border-slate-700">
                      <span className="text-slate-400 block mb-2 font-sans font-bold text-xs uppercase">
                        Aktualny wynik z silnika optymalizacyjnego:
                      </span>
                      <div className="bg-slate-900 p-3 rounded border border-slate-600">
                        <p>Optymalny x: <span className="text-white font-bold">{results.optX.toFixed(3)}</span></p>
                        <p>Optymalny y: <span className="text-white font-bold">{results.optY.toFixed(3)}</span></p>
                        {results.isActive ? (
                          <p>Mnożnik λ/μ: <span className="text-rose-400 font-bold">{results.lambdaMu.toFixed(3)}</span></p>
                        ) : (
                          <p className="text-emerald-400 mt-1">Warunek nieaktywny, λ/μ = 0</p>
                        )}
                      </div>
                    </div>
                  </div>
                  )}
                </div>
              </div>

              {/* Panel prawy: Wizualizacja Canvas */}
              <div className="w-full lg:w-1/2 p-6 flex flex-col items-center justify-center bg-white relative">
                
                <div className={`absolute z-10 top-6 left-1/2 -translate-x-1/2 px-4 py-2 rounded-full text-sm font-bold shadow-md border whitespace-nowrap ${!conditionEnabled ? 'bg-blue-100 text-blue-800 border-blue-300' : results.isActive ? 'bg-rose-100 text-rose-800 border-rose-300' : 'bg-emerald-100 text-emerald-800 border-emerald-300'}`}>
                  {!conditionEnabled ? "Optymalizacja swobodna (Warunek wyłączony)" : results.isActive ? "Punkt zablokowany na granicy (Bariera aktywna)" : "Punkt swobodny w studni (Bariera nieaktywna)"}
                </div>

                <div 
                  className="relative mt-10 shadow-lg border-2 border-slate-800 rounded-lg overflow-hidden cursor-crosshair" 
                  style={{ width: width, height: height }}
                  onMouseMove={(e) => {
                    const rect = e.currentTarget.getBoundingClientRect();
                    const px = e.clientX - rect.left;
                    const py = e.clientY - rect.top;
                    const x = (px - width / 2) / scale;
                    const y = (height / 2 - py) / scale;
                    setHoverInfo({ px, py, x, y, val: f(x, y) });
                  }}
                  onMouseLeave={() => setHoverInfo(null)}
                >
                  {/* Warstwa pod spodem: Mapa cieplna */}
                  <canvas 
                    ref={bgCanvasRef} 
                    width={width} 
                    height={height} 
                    className="absolute top-0 left-0 pointer-events-none"
                  />
                  {/* Warstwa na wierzchu: Interfejs, Linie, Wektory */}
                  <canvas 
                    ref={fgCanvasRef} 
                    width={width} 
                    height={height} 
                    className="absolute top-0 left-0 pointer-events-none"
                  />
                  
                  {/* Tooltip przy najeździe */}
                  {hoverInfo && (
                    <div 
                      className="absolute z-20 bg-slate-900/90 text-white text-xs px-2 py-1 rounded shadow-lg pointer-events-none transform -translate-x-1/2 -translate-y-full border border-slate-700 backdrop-blur-sm"
                      style={{ left: hoverInfo.px, top: hoverInfo.py - 15 }}
                    >
                      f({hoverInfo.x.toFixed(2)}, {hoverInfo.y.toFixed(2)}) = <span className="font-bold text-yellow-400">{hoverInfo.val.toFixed(2)}</span>
                    </div>
                  )}
                </div>
                
                <div className="mt-4 text-center text-sm text-slate-500 max-w-md">
                  Ciemnofioletowe obszary to dno "studni". <span className="text-emerald-600 font-bold">Zielona kropka</span> to dno globalne, <span className="text-yellow-600 font-bold">żółta</span> to lokalne. 
                  Przesuwaj suwak w trybie KKT, aby zobaczyć przeskoki między nimi!
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
